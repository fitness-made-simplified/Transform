<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMS | Strength Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .stat-label { font-size: 8px; font-weight: 900; text-transform: uppercase; color: #737373; letter-spacing: 0.1em; }
        .stat-value { font-size: 14px; font-weight: 900; font-style: italic; }

        /* Exercise cards */
        .ex-card { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); cursor: pointer; border-left: 4px solid rgba(255,255,255,0.05); }
        .ex-card.open { border-left: 4px solid #e11d48; background: rgba(225,29,72,0.04); }
        .ex-content { max-height: 0; opacity: 0; transition: all 0.45s ease; overflow: hidden; }
        .ex-card.open .ex-content { max-height: 9999px; opacity: 1; padding-top: 14px; }
        .chevron { transition: transform 0.3s ease; }
        .ex-card.open .chevron { transform: rotate(180deg); }

        /* PR badge */
        .pr-badge { font-size: 7px; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase;
            background: #e11d48; color: #fff;
            padding: 2px 7px; border-radius: 99px; }

        /* History table */
        .hist-table { border-collapse: collapse; width: 100%; }
        .hist-table th { font-size: 7px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #525252; padding: 4px 6px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .hist-table td { font-size: 12px; padding: 7px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); color: #d4d4d4; }
        .hist-table tr:last-child td { border-bottom: none; }
        .hist-table tr.best td { color: #e11d48; font-weight: 900; }

        /* Modal */
        #addModal { display: none; position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); align-items: flex-end; }
        #addModal.show { display: flex; }
        #modalBox { background: #0f0f0f; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px 24px 0 0; padding: 24px; width: 100%; max-height: 85vh; overflow-y: auto; animation: slideUp 0.35s cubic-bezier(0.4,0,0.2,1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; padding: 12px 14px; font-size: 14px; font-weight: 700; outline: none; width: 100%; font-family: 'Inter', sans-serif; }
        input:focus, select:focus { border-color: #e11d48; }
        input::placeholder { color: #525252; }
        select option { background: #111; }
        label { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.12em; color: #737373; display: block; margin-bottom: 6px; }

        /* Search bar */
        #searchInput { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; color: #fff; padding: 12px 16px; font-size: 13px; font-weight: 700; outline: none; width: 100%; font-family: 'Inter', sans-serif; }
        #searchInput:focus { border-color: rgba(225,29,72,0.4); }
        #searchInput::placeholder { color: #404040; }

        /* Tabs */
        .tab-btn { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; padding: 8px 14px; border-radius: 10px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; color: #525252; }
        .tab-btn.active { background: rgba(225,29,72,0.12); border-color: rgba(225,29,72,0.3); color: #e11d48; }

        /* Shimmer loader */
        .shimmer { background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.03) 75%); background-size: 400%; animation: shimmer 1.5s infinite; border-radius: 16px; }
        @keyframes shimmer { from { background-position: 100%; } to { background-position: -100%; } }

        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: #e11d48; color: #fff; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; padding: 10px 20px; border-radius: 99px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100; white-space: nowrap; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="p-5 pb-32">

    <!-- Header -->
    <header class="mb-7">
        <a id="backLink" href="profile.html" class="text-rose-500 font-black uppercase text-[10px] tracking-widest mb-5 block">← Back to Profile</a>
        <p class="stat-label text-rose-500 mb-1">Performance Lab</p>
        <h1 class="text-4xl font-black uppercase italic leading-none" id="clientName">Loading...</h1>
        <p class="text-[10px] font-black uppercase text-neutral-500 tracking-[0.2em] mt-2">Strength & Weight Tracker</p>
    </header>

    <!-- Summary Stats -->
    <div class="grid grid-cols-3 gap-2 mb-6" id="summaryBar">
        <div class="glass p-3 text-center shimmer h-14"></div>
        <div class="glass p-3 text-center shimmer h-14"></div>
        <div class="glass p-3 text-center shimmer h-14"></div>
    </div>

    <!-- Tabs + Search -->
    <div class="flex gap-2 mb-4 overflow-x-auto pb-1 scrollbar-hide">
        <button class="tab-btn active" onclick="setTab('all',this)">All</button>
        <button class="tab-btn" onclick="setTab('recent',this)">Recent 7d</button>
        <button class="tab-btn" onclick="setTab('prs',this)">PRs Only</button>
    </div>
    <div class="mb-5">
        <input id="searchInput" type="text" placeholder="Search exercise..." oninput="renderCards()">
    </div>

    <!-- Exercise Cards -->
    <div id="exerciseList" class="space-y-3">
        <div class="shimmer h-16 rounded-2xl"></div>
        <div class="shimmer h-16 rounded-2xl mt-3"></div>
        <div class="shimmer h-16 rounded-2xl mt-3"></div>
    </div>

    <!-- FAB: Add Workout -->
    <button onclick="openModal()" class="fixed bottom-6 right-6 z-40 bg-rose-600 text-white font-black text-xs uppercase tracking-widest px-5 py-4 rounded-2xl shadow-lg shadow-rose-900/40 active:scale-95 transition-transform flex items-center gap-2">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
        Log Workout
    </button>

    <!-- Add Workout Modal -->
    <div id="addModal" onclick="handleModalBg(event)">
        <div id="modalBox">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p class="stat-label text-rose-500">Performance Lab</p>
                    <h2 class="text-lg font-black uppercase italic">Log New Set</h2>
                </div>
                <button onclick="closeModal()" class="text-neutral-500 hover:text-white transition-colors">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label>Date</label>
                    <input type="date" id="inDate">
                </div>
                <div>
                    <label>Exercise Name</label>
                    <input type="text" id="inExercise" placeholder="e.g. Barbell Row" list="exSuggestions" autocomplete="off">
                    <datalist id="exSuggestions"></datalist>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label>Sets</label>
                        <input type="number" id="inSets" placeholder="3" min="1">
                    </div>
                    <div>
                        <label>Reps</label>
                        <input type="number" id="inReps" placeholder="10" min="1">
                    </div>
                    <div>
                        <label>Weight</label>
                        <input type="number" id="inWeight" placeholder="kg" min="0" step="0.5">
                    </div>
                </div>
                <button onclick="submitWorkout()" id="submitBtn"
                    class="w-full bg-rose-600 text-white font-black uppercase tracking-widest py-4 rounded-2xl text-sm active:scale-95 transition-transform mt-2">
                    Save to Tracker
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ── CONFIG ────────────────────────────────────────────────────────────
        // SheetDB endpoint for your Workouts sheet (same app, different sheet tab)
        // Replace with your actual SheetDB URL for the workouts sheet
        const WORKOUTS_API = 'https://sheetdb.io/api/v1/q4n4z3yr8dbyt?sheet=Workouts';
        const CLIENTS_API  = 'https://sheetdb.io/api/v1/q4n4z3yr8dbyt';

        // ── STATE ─────────────────────────────────────────────────────────────
        const params   = new URLSearchParams(window.location.search);
        const clientId = (params.get('id') || '').toLowerCase();
        let allWorkouts = [];   // filtered to this client
        let activeTab   = 'all';

        // ── INIT ──────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', async () => {
            // back link
            document.getElementById('backLink').href = `profile.html?id=${clientId}`;

            // default date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('inDate').value = today;

            await Promise.all([loadClientName(), loadWorkouts()]);
        });

        async function loadClientName() {
            try {
                const res  = await fetch(CLIENTS_API);
                const data = await res.json();
                const u    = data.find(r => r.Client_ID && r.Client_ID.toLowerCase() === clientId);
                document.getElementById('clientName').innerText = u ? u.Name : clientId.toUpperCase();
            } catch(e) {
                document.getElementById('clientName').innerText = clientId.toUpperCase();
            }
        }

        async function loadWorkouts() {
            try {
                const res  = await fetch(WORKOUTS_API);
                const data = await res.json();

                // Normalise: accept id, client_id, Client_ID
                allWorkouts = data.filter(r => {
                    const rid = (r.id || r.client_id || r.Client_ID || '').toLowerCase();
                    return rid === clientId;
                }).map(r => ({
                    date    : r.date     || r.Date     || '',
                    exercise: r.exercise || r.Exercise || '',
                    sets    : parseInt(r.sets    || r.Sets    || 0),
                    reps    : parseInt(r.reps    || r.Reps    || 0),
                    weight  : parseFloat(r.weight  || r.Weight  || 0) || 0,
                })).sort((a,b) => new Date(b.date) - new Date(a.date));

            } catch(e) {
                showToast('Could not load workouts');
                allWorkouts = [];
            }
            renderSummary();
            renderCards();
            populateSuggestions();
        }

        // ── SUMMARY ───────────────────────────────────────────────────────────
        function renderSummary() {
            const uniqueEx  = new Set(allWorkouts.map(w => w.exercise.toLowerCase())).size;
            const totalSets = allWorkouts.reduce((s,w) => s + (w.sets||0), 0);
            const totalVol  = allWorkouts.reduce((s,w) => s + (w.sets||0)*(w.reps||0)*(w.weight||0), 0);

            document.getElementById('summaryBar').innerHTML = `
                <div class="glass p-3 text-center">
                    <p class="stat-label">Exercises</p>
                    <p class="stat-value text-rose-500">${uniqueEx}</p>
                </div>
                <div class="glass p-3 text-center">
                    <p class="stat-label">Total Sets</p>
                    <p class="stat-value">${totalSets}</p>
                </div>
                <div class="glass p-3 text-center">
                    <p class="stat-label">Volume (kg)</p>
                    <p class="stat-value text-white">${totalVol >= 1000 ? (totalVol/1000).toFixed(1)+'k' : totalVol.toFixed(0)}</p>
                </div>`;
        }

        // ── TABS / FILTER ─────────────────────────────────────────────────────
        function setTab(tab, btn) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCards();
        }

        function getFiltered() {
            let data = [...allWorkouts];
            const q  = document.getElementById('searchInput').value.trim().toLowerCase();

            if (activeTab === 'recent') {
                const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
                data = data.filter(w => new Date(w.date) >= cutoff);
            }

            if (q) data = data.filter(w => w.exercise.toLowerCase().includes(q));
            return data;
        }

        // ── CARDS ─────────────────────────────────────────────────────────────
        function renderCards() {
            const filtered = getFiltered();
            const container = document.getElementById('exerciseList');

            if (!filtered.length) {
                container.innerHTML = `<div class='text-center py-14 opacity-30 text-[10px] font-black uppercase tracking-widest'>No workout data found</div>`;
                return;
            }

            // Group by exercise
            const groups = {};
            filtered.forEach(w => {
                const key = w.exercise.trim().toLowerCase();
                if (!groups[key]) groups[key] = { name: w.exercise.trim(), entries: [] };
                groups[key].entries.push(w);
            });

            // Compute per-exercise best (by weight → then by sets*reps)
            const sortedGroups = Object.values(groups).sort((a,b) => a.name.localeCompare(b.name));

            // If PR tab, only show exercises that have a PR entry
            // (all exercises always have a PR, so just show all)
            let html = '';
            sortedGroups.forEach((g, idx) => {
                const entries = g.entries; // already newest-first
                const best    = findBest(entries);

                // PR tab: show only if the latest entry matches the best
                if (activeTab === 'prs') {
                    const latest = entries[0];
                    if (latest.weight < best.weight) return;
                }

                html += buildCard(g.name, entries, best, idx);
            });

            container.innerHTML = html || `<div class='text-center py-14 opacity-30 text-[10px] font-black uppercase tracking-widest'>No PRs found</div>`;
        }

        function findBest(entries) {
            return entries.reduce((best, e) => {
                if (e.weight > best.weight) return e;
                if (e.weight === best.weight && (e.sets*e.reps) > (best.sets*best.reps)) return e;
                return best;
            }, entries[0]);
        }

        function buildCard(name, entries, best, idx) {
            const rows = entries.slice(0,10).map((e, i) => {
                const isBest = (e === best);
                const vol    = ((e.sets||0)*(e.reps||0)*(e.weight||0)).toFixed(0);
                return `<tr class="${isBest ? 'best' : ''}">
                    <td>${fmtDate(e.date)}</td>
                    <td>${e.sets}</td>
                    <td>${e.reps}</td>
                    <td>${e.weight ? e.weight+'kg' : '—'}</td>
                    <td class="text-neutral-600">${vol ? vol+'kg' : '—'}</td>
                    ${isBest ? '<td><span class="pr-badge">PR</span></td>' : '<td></td>'}
                </tr>`;
            }).join('');

            const cardId = `ex-${idx}`;
            return `
            <div class="ex-card glass p-5" onclick="this.classList.toggle('open')">
                <div class="flex justify-between items-center">
                    <div class="flex-1 min-w-0">
                        <p class="stat-label text-rose-500 mb-1">${entries.length} session${entries.length!==1?'s':''}</p>
                        <h3 class="text-[15px] font-black uppercase italic leading-tight truncate">${name}</h3>
                    </div>
                    <div class="flex items-center gap-3 ml-3 shrink-0">
                        <div class="text-right">
                            <p class="stat-label">Best</p>
                            <p class="stat-value text-rose-500">${best.weight ? best.weight+'kg' : '—'}</p>
                        </div>
                        <svg class="chevron text-rose-600" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                </div>
                <div class="ex-content">
                    <div class="overflow-x-auto -mx-1">
                        <table class="hist-table">
                            <thead><tr>
                                <th>Date</th><th>Sets</th><th>Reps</th><th>Weight</th><th>Vol.</th><th></th>
                            </tr></thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                    ${entries.length > 10 ? `<p class="text-[9px] font-black uppercase text-neutral-600 tracking-widest mt-3 text-center">Showing 10 most recent sessions</p>` : ''}
                </div>
            </div>`;
        }

        function fmtDate(d) {
            if (!d) return '—';
            // handle dd/mm/yyyy and yyyy-mm-dd
            let parts;
            if (d.includes('/')) {
                parts = d.split('/');
                if (parts.length === 3) {
                    // dd/mm/yyyy
                    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                    return `${parts[0]} ${months[parseInt(parts[1])-1]}`;
                }
            }
            const dt = new Date(d);
            if (isNaN(dt)) return d;
            return dt.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
        }

        // ── AUTOCOMPLETE ──────────────────────────────────────────────────────
        function populateSuggestions() {
            const dl = document.getElementById('exSuggestions');
            const unique = [...new Set(allWorkouts.map(w => w.exercise.trim()))].sort();
            dl.innerHTML = unique.map(e => `<option value="${e}">`).join('');
        }

        // ── MODAL ─────────────────────────────────────────────────────────────
        function openModal() { document.getElementById('addModal').classList.add('show'); }
        function closeModal() { document.getElementById('addModal').classList.remove('show'); }
        function handleModalBg(e) { if(e.target === document.getElementById('addModal')) closeModal(); }

        async function submitWorkout() {
            const date     = document.getElementById('inDate').value;
            const exercise = document.getElementById('inExercise').value.trim();
            const sets     = document.getElementById('inSets').value;
            const reps     = document.getElementById('inReps').value;
            const weight   = document.getElementById('inWeight').value;

            if (!date || !exercise || !sets || !reps) {
                showToast('Fill all fields first'); return;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerText = 'Saving…';
            btn.disabled  = true;

            const payload = {
                data: [{
                    id      : clientId,
                    date    : date,
                    exercise: exercise,
                    sets    : sets,
                    reps    : reps,
                    weight  : weight || 0
                }]
            };

            try {
                const res = await fetch(WORKOUTS_API, {
                    method : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body   : JSON.stringify(payload)
                });

                if (res.ok) {
                    // Optimistically add to local state
                    allWorkouts.unshift({
                        date: date, exercise, sets: parseInt(sets),
                        reps: parseInt(reps), weight: parseFloat(weight)||0
                    });
                    allWorkouts.sort((a,b) => new Date(b.date) - new Date(a.date));

                    renderSummary();
                    renderCards();
                    populateSuggestions();
                    closeModal();
                    showToast('Logged! 💪');

                    // reset
                    document.getElementById('inExercise').value = '';
                    document.getElementById('inSets').value     = '';
                    document.getElementById('inReps').value     = '';
                    document.getElementById('inWeight').value   = '';
                } else {
                    showToast('Save failed — check sheet config');
                }
            } catch(e) {
                showToast('Network error');
            }

            btn.innerText = 'Save to Tracker';
            btn.disabled  = false;
        }

        // ── TOAST ─────────────────────────────────────────────────────────────
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
