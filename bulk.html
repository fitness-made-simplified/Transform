<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMS | Muscle Pack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Stable Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; padding: 24px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .day-card { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-weight: 900; font-style: italic; border: 1px solid rgba(251, 191, 36, 0.2); border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .day-card:active { transform: scale(0.9); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; padding: 24px; align-items: center; justify-content: center; }
        .exercise-card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; border-left: 4px solid #f59e0b; }
    </style>
</head>
<body class="pb-20">
    <header class="mb-10">
        <a href="index.html" class="text-amber-500 font-black uppercase text-[10px] tracking-widest mb-4 block">← Back</a>
        <h1 class="text-4xl font-black uppercase italic leading-none mb-2">MUSCLE <span class="text-amber-500">PACK</span></h1>
        <p class="text-[10px] font-black uppercase text-neutral-500 italic tracking-[0.2em]">"Hypertrophy Protocol: Build & Conquer."</p>
    </header>

    <!-- 30 Day Grid -->
    <div class="grid grid-cols-5 gap-3 mb-12" id="daysGrid">
        <script>
            for(let i=1; i<=30; i++) {
                document.write(`<div onclick="openDay(${i})" class="glass day-card">${i}</div>`);
            }
        </script>
    </div>

    <!-- CTA Section -->
    <div class="glass p-8 text-center border-t-2 border-amber-500">
        <h3 class="font-black italic text-xl uppercase mb-2 text-amber-500">Mass Builder Pro</h3>
        <p class="text-[11px] text-neutral-400 mb-6 uppercase tracking-wider">Custom Nutrition & Load Progression</p>
        <a href="https://wa.me/919899550279?text=I'm ready for the Bulk Protocol" class="inline-block bg-amber-500 text-black px-8 py-4 rounded-xl font-black uppercase text-xs tracking-widest">Get Custom Plan</a>
    </div>

    <!-- Workout Modal -->
    <div id="dayModal" class="modal" onclick="this.style.display='none'">
        <div class="glass p-6 w-full max-w-sm max-h-[85vh] flex flex-col border border-amber-600/20" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-3xl font-black italic uppercase text-amber-500 mb-6 text-center"></h2>
            <div id="modalContent" class="overflow-y-auto pr-2 space-y-4"></div>
            <button onclick="document.getElementById('dayModal').style.display='none'" class="mt-6 w-full py-4 bg-white/5 border border-white/10 rounded-xl font-black uppercase text-[10px]">Close Workout</button>
        </div>
    </div>

    <script>
        // Specific Weightlifting Icons for Bulk Section
        const exerciseLibrary = {
            "DB Chest Press": { icon: "fa-dumbbell", color: "text-amber-400" },
            "Push Ups": { icon: "fa-mound", color: "text-amber-200" },
            "Arnold Press": { icon: "fa-arrows-up-to-line", color: "text-yellow-500" },
            "DB Row": { icon: "fa-hand-back-fist", color: "text-orange-400" },
            "Deadlifts": { icon: "fa-weight-hanging", color: "text-amber-600" },
            "DB Curls": { icon: "fa-person-walking-luggage", color: "text-yellow-400" },
            "Squats": { icon: "fa-arrows-up-down", color: "text-amber-500" },
            "Walking Lunges": { icon: "fa-shoe-prints", color: "text-orange-300" },
            "Calf Raises": { icon: "fa-up-long", color: "text-amber-300" },
            "Hammer Curls": { icon: "fa-gear", color: "text-yellow-200" },
            "DB Flys": { icon: "fa-arrows-left-right", color: "text-amber-400" },
            "Tricep Dips": { icon: "fa-chair", color: "text-neutral-400" }
        };

        const names = Object.keys(exerciseLibrary);

        function openDay(day) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = "DAY " + day;

            if (day % 4 === 0) {
                modalContent.innerHTML = `
                    <div class="text-center py-10">
                        <i class="fas fa-bed text-amber-500 text-5xl mb-4"></i>
                        <p class="text-lg italic font-black text-amber-500 uppercase">Mass Recovery</p>
                        <p class="text-xs text-neutral-500 mt-2 italic">Eat big. Sleep big. Grow big.</p>
                    </div>`;
            } else {
                // Bulk logic: Lower reps (8-12) for higher intensity
                const reps = 10 + (Math.floor(day/6) * 2);
                let html = "";
                
                // Pick 3 exercises per day from the bulk list
                for(let i=0; i<3; i++) {
                    const exName = names[(day + i) % names.length];
                    const exData = exerciseLibrary[exName];
                    html += `
                    <div class="exercise-card flex items-center gap-4">
                        <div class="w-12 h-12 flex items-center justify-center bg-white/5 rounded-lg border border-white/10">
                            <i class="fas ${exData.icon} ${exData.color} text-xl"></i>
                        </div>
                        <div class="flex-1">
                            <p class="font-black uppercase italic text-sm tracking-widest text-white">${exName}</p>
                            <p class="text-[10px] uppercase font-bold text-neutral-500">Heavy Sets: <span class="text-amber-500 font-black">4 x ${reps}</span></p>
                        </div>
                    </div>`;
                }
                modalContent.innerHTML = html;
            }
            document.getElementById('dayModal').style.display = 'flex';
        }
    </script>
</body>
</html>
