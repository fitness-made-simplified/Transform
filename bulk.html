<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMS | Muscle Pack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; padding: 24px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .day-card { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-weight: 900; font-style: italic; border: 1px solid rgba(251, 191, 36, 0.2); border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .day-card:active { transform: scale(0.9); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; padding: 24px; align-items: center; justify-content: center; }
    </style>
</head>
<body class="pb-20">
    <header class="mb-10">
        <a href="index.html" class="text-amber-500 font-black uppercase text-[10px] tracking-widest mb-4 block">← Back</a>
        <h1 class="text-4xl font-black uppercase italic leading-none mb-2">MUSCLE <span class="text-amber-500">PACK</span></h1>
        <p class="text-[10px] font-black uppercase text-neutral-500 italic tracking-[0.2em]">"Build without injury. Perform with power."</p>
    </header>

    <div class="grid grid-cols-5 gap-3 mb-12" id="daysGrid">
        <script>
            // Render 30 days as requested
            for(let i=1; i<=30; i++) {
                document.write(`<div onclick="openDay(${i})" class="glass day-card">${i}</div>`);
            }
        </script>
    </div>

    <div class="glass p-8 text-center border-t-2 border-amber-500">
        <h3 class="font-black italic text-xl uppercase mb-2">Hypertrophy Masterplan</h3>
        <p class="text-sm text-neutral-400 mb-6 italic leading-relaxed">Muscle growth requires precision. Get a custom schedule designed for your biomechanics and injury history.</p>
        <a href="https://wa.me/919899550279?text=I want a Custom Muscle Program" class="inline-block bg-amber-500 text-black px-8 py-4 rounded-xl font-black uppercase text-xs tracking-widest">Get Custom Plan</a>
    </div>

    <div id="dayModal" class="modal" onclick="this.style.display='none'">
        <div class="glass p-8 w-full max-w-sm" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-3xl font-black italic uppercase text-amber-500 mb-4"></h2>
            <div id="modalContent" class="text-neutral-200 text-sm italic space-y-3 leading-relaxed"></div>
            <button onclick="document.getElementById('dayModal').style.display='none'" class="mt-8 w-full py-4 bg-white/5 rounded-xl font-black uppercase text-[10px]">Close</button>
        </div>
    </div>

    <script>
        function openDay(day) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = "DAY " + day;

            // Rest day every 4th day
            if (day % 4 === 0) {
                modalContent.innerHTML = "<b>Recovery Phase:</b><br>Focus on deep stretching and quality sleep. Muscle grows during rest, not work.";
                document.getElementById('dayModal').style.display = 'flex';
                return;
            }

            // Progression Logic: Every 4-day cycle adds 4 reps
            const cycle = Math.floor((day - 1) / 4);
            const extraReps = cycle * 4;
            const baseSets = 3;
            const baseReps = 10 + extraReps;

            // Determine Workout Rotation (A or B)
            const workoutNumber = Math.ceil(day / 4);
            const isVersionB = workoutNumber % 2 === 0;

            let html = "";

            // Day 1 Type: Chest/Shoulder/Tricep
            if (day % 4 === 1) {
                html = "<b>Push Focus (C/S/T):</b><br>";
                if (!isVersionB) {
                    html += `• Push Ups: ${baseSets}x${baseReps}<br>• DB Chest Fly: ${baseSets}x${baseReps}<br>• Side Raises: ${baseSets}x${baseReps}<br>• Front Raises: ${baseSets}x${baseReps}<br>• Overhead Ext: ${baseSets}x15`;
                } else {
                    html += `• DB Chest Press: ${baseSets}x${baseReps}<br>• DB Pullover: ${baseSets}x${baseReps}<br>• Arnold Press: ${baseSets}x${baseReps}<br>• Tricep Dips: ${baseSets}xMax<br>• Kickbacks: ${baseSets}x15`;
                }
            } 
            // Day 2 Type: Back/Traps/Bicep
            else if (day % 4 === 2) {
                html = "<b>Pull Focus (B/T/B):</b><br>";
                if (!isVersionB) {
                    html += `• DB Row (Overhand): ${baseSets}x${baseReps}<br>• Single Arm Row: ${baseSets}x${baseReps}<br>• Upright Rows: ${baseSets}x${baseReps}<br>• DB Shrugs: ${baseSets}x${baseReps}<br>• DB Curls: ${baseSets}x${baseReps}`;
                } else {
                    html += `• Neutral Grip Row: ${baseSets}x${baseReps}<br>• DB Deadlifts: ${baseSets}x${baseReps}<br>• DB Shrugs: ${baseSets}x${baseReps}<br>• Hammer Curls: ${baseSets}x${baseReps}<br>• Concentration Curls: ${baseSets}x12`;
                }
            }
            // Day 3 Type: Legs
            else if (day % 4 === 3) {
                html = "<b>Lower Body Focus:</b><br>";
                if (!isVersionB) {
                    html += `• Squats: ${baseSets}x${baseReps}<br>• Front Squats: ${baseSets}x${baseReps}<br>• Donkey Kicks: ${baseSets}x20<br>• Jump Squats: ${baseSets}x10`;
                } else {
                    html += `• Walking Lunges: ${baseSets}x${baseReps} (Steps)<br>• Sumo Squats: ${baseSets}x${baseReps}<br>• Calf Raises: ${baseSets}x20<br>• Jump Squats: ${baseSets}x10`;
                }
            }

            modalContent.innerHTML = html + `<br><br><b>Progression:</b> +4 reps added from previous cycle.`;
            document.getElementById('dayModal').style.display = 'flex';
        }
    </script>
</body>
</html>
