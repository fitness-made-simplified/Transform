<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FMS | Client Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .rose-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6 pb-24">

    <div id="portal-container" class="max-w-xl mx-auto">
        
        <div id="login-section" class="pt-20 text-center">
            <div class="rose-gradient w-16 h-16 rounded-2xl flex items-center justify-center font-black italic text-white mx-auto mb-6">FS</div>
            <h2 class="text-3xl font-black uppercase italic mb-10">Client <span class="text-rose-600">Portal</span></h2>
            <input type="text" id="clientIdInput" placeholder="Enter Client ID" class="bg-white/5 border border-white/10 rounded-xl p-4 w-full mb-4 text-white outline-none focus:border-rose-500">
            <button onclick="fetchClientData()" id="loginBtn" class="rose-gradient w-full py-4 rounded-xl font-black uppercase text-xs tracking-widest text-white">View Progress</button>
            <p id="errorMsg" class="text-rose-500 text-[10px] font-bold uppercase mt-4 hidden">ID Not Found</p>
        </div>

        <div id="profile-display" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <h1 id="clientName" class="text-4xl font-black uppercase italic tracking-tighter">--</h1>
                <button onclick="window.location.reload()" class="text-[10px] font-black uppercase text-neutral-500">Exit</button>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="glass p-5 text-center">
                    <p class="text-[9px] uppercase text-neutral-500 mb-1">Current Weight</p>
                    <p class="text-2xl font-black italic"><span id="weight">--</span>kg</p>
                </div>
                <div class="glass p-5 text-center border-b-2 border-rose-500">
                    <p class="text-[9px] uppercase text-rose-500 mb-1">BMI Score</p>
                    <p id="bmi" class="text-2xl font-black italic text-rose-500">--</p>
                </div>
            </div>

            <div class="mb-10">
                <h3 class="text-[10px] font-black uppercase text-blue-500 mb-4 tracking-widest">Weekly Schedule</h3>
                <div class="glass p-6 bg-blue-500/5 border-t border-blue-500/20">
                    <p id="schedule" class="text-sm italic leading-relaxed text-neutral-300">Loading plan...</p>
                </div>
            </div>

            <h3 class="text-[10px] font-black uppercase text-rose-500 mb-4 tracking-widest">Max Lifts (Journal)</h3>
            <div class="glass overflow-hidden mb-10">
                <table class="w-full text-left text-sm">
                    <tbody id="journalBody" class="font-bold italic"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SHEETDB_URL = "https://sheetdb.io/api/v1/q4n4z3yr8dbyt";

        async function fetchClientData() {
            const id = document.getElementById('clientIdInput').value.trim();
            const btn = document.getElementById('loginBtn');
            if (!id) return;

            btn.innerText = "VERIFYING...";

            try {
                const response = await fetch(`${SHEETDB_URL}/search?id=${id}`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const client = data[0];

                    // Data Mapping
                    document.getElementById('clientName').innerText = client.name;
                    document.getElementById('weight').innerText = client.weight;
                    document.getElementById('schedule').innerHTML = (client.schedule || "Rest Day").replaceAll('\n', '<br>');

                    // BMI
                    const h = parseFloat(client.height);
                    const w = parseFloat(client.weight);
                    if (h > 0 && w > 0) {
                        document.getElementById('bmi').innerText = (w / ((h/100)**2)).toFixed(1);
                    }

                    // Journal Split
                    const journal = document.getElementById('journalBody');
                    journal.innerHTML = "";
                    if (client.lifts) {
                        client.lifts.split(',').forEach(item => {
                            if (item.includes(':')) {
                                const [ex, wt] = item.split(':');
                                journal.innerHTML += `<tr class="border-t border-white/5"><td class="p-4 uppercase">${ex.trim()}</td><td class="p-4 text-rose-500 text-right">${wt.trim()}</td></tr>`;
                            }
                        });
                    }

                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('profile-display').classList.remove('hidden');
                } else {
                    document.getElementById('errorMsg').classList.remove('hidden');
                    btn.innerText = "View Progress";
                }
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
