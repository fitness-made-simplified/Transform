<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FMS | Client Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .rose-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .accent-orange { color: #ff4d00; }
        .btn-press:active { transform: scale(0.96); }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; outline: none; width: 100%; transition: 0.3s; }
        input:focus { border-color: #ff4d00; background: rgba(255,255,255,0.1); }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6 pb-20">

    <section id="login-section" class="max-w-md mx-auto pt-20 text-center">
        <div class="rose-gradient w-16 h-16 rounded-2xl flex items-center justify-center font-black italic text-white mx-auto mb-6 shadow-lg shadow-rose-500/20">FS</div>
        <h2 class="text-4xl font-black uppercase italic tracking-tighter mb-2">Client <span class="accent-orange">Portal</span></h2>
        <p class="text-neutral-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-10">Physio-Led Transformation Track</p>
        
        <div class="flex flex-col gap-4">
            <input type="text" id="clientIdInput" placeholder="Enter Client ID (e.g., fms101)">
            <button id="loginBtn" onclick="fetchClientData()" class="rose-gradient py-4 rounded-xl font-black uppercase text-xs tracking-widest btn-press text-white shadow-xl">
                View My Transformation
            </button>
        </div>
        <p id="errorMessage" class="text-rose-500 text-[10px] mt-6 font-bold uppercase hidden tracking-widest">Invalid ID. Please try again.</p>
    </section>

    <section id="profile-display" class="max-w-xl mx-auto mt-10 hidden">
        <button onclick="window.location.reload()" class="mb-8 text-neutral-500 font-black uppercase text-[10px] tracking-widest flex items-center gap-2 opacity-60 hover:opacity-100 transition-all">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Login
        </button>
        
        <h1 id="clientName" class="text-5xl font-black uppercase italic leading-none mb-3 tracking-tighter">--</h1>
        <div id="package" class="inline-block bg-orange-600/10 text-[#ff4d00] border border-orange-600/20 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest mb-10">--</div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-6 text-center">
                <p class="text-[9px] font-black uppercase text-neutral-500 mb-2 tracking-widest">Weight</p>
                <p class="text-3xl font-black italic"><span id="weight">--</span> <span class="text-xs text-neutral-500 uppercase">kg</span></p>
            </div>
            <div class="glass p-6 text-center">
                <p class="text-[9px] font-black uppercase text-neutral-500 mb-2 tracking-widest">Height</p>
                <p class="text-3xl font-black italic"><span id="height">--</span> <span class="text-xs text-neutral-500 uppercase">cm</span></p>
            </div>
            <div class="glass p-6 text-center border-b-4 border-orange-600">
                <p class="text-[9px] font-black uppercase text-orange-500 mb-2 tracking-widest">BMI Score</p>
                <p id="bmi" class="text-4xl font-black italic text-orange-500">--</p>
            </div>
            <div class="glass p-6 text-center">
                <p class="text-[9px] font-black uppercase text-neutral-500 mb-2 tracking-widest">Fat %</p>
                <p class="text-3xl font-black italic"><span id="fat">--</span><span class="text-xs text-neutral-500">%</span></p>
            </div>
        </div>

        <div class="mt-12">
            <h3 class="text-[10px] font-black uppercase text-orange-500 mb-4 tracking-[0.3em]">Workout Journal <span class="text-white opacity-40">(Max Lifts)</span></h3>
            <div class="glass overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-[9px] font-black uppercase text-neutral-500 tracking-widest">
                        <tr>
                            <th class="p-5">Exercise / Machine</th>
                            <th class="p-5 text-right">Heaviest</th>
                        </tr>
                    </thead>
                    <tbody id="journalBody" class="font-bold italic text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </section>

    <script>
        // Your Verified API Link
        const SHEETDB_URL = "https://sheetdb.io/api/v1/q4n4z3yr8dbyt"; 

        async function fetchClientData() {
            const idInput = document.getElementById('clientIdInput');
            const loginBtn = document.getElementById('loginBtn');
            const id = idInput.value.trim();
            const errorMsg = document.getElementById('errorMessage');
            const loginSection = document.getElementById('login-section');
            const profileDisplay = document.getElementById('profile-display');

            if (!id) return;

            // Loading state
            loginBtn.innerText = "Searching...";
            loginBtn.style.opacity = "0.7";
            errorMsg.classList.add('hidden');

            try {
                // Precise search for the ID
                const response = await fetch(`${SHEETDB_URL}/search?id=${id}`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const client = data[0];

                    // Map UI Fields
                    document.getElementById('clientName').innerText = client.name || "Client";
                    document.getElementById('package').innerText = client.package || "Custom Plan";
                    document.getElementById('weight').innerText = client.weight || "0";
                    document.getElementById('height').innerText = client.height || "0";
                    document.getElementById('fat').innerText = client.fat_percent || "0";

                    // BMI Calculation
                    const w = parseFloat(client.weight);
                    const h = parseFloat(client.height);
                    if (w > 0 && h > 0) {
                        const hMeters = h / 100;
                        const bmiValue = (w / (hMeters * hMeters)).toFixed(1);
                        document.getElementById('bmi').innerText = bmiValue;
                    }

                    // Workout Journal Rendering
                    const journalBody = document.getElementById('journalBody');
                    journalBody.innerHTML = ""; 
                    
                    if (client.lifts) {
                        const liftArray = client.lifts.split(','); 
                        liftArray.forEach(item => {
                            if (item.includes(':')) {
                                const [ex, wt] = item.split(':');
                                journalBody.innerHTML += `
                                    <tr class="border-t border-white/5">
                                        <td class="p-5 text-white/90 uppercase tracking-tighter">${ex.trim()}</td>
                                        <td class="p-5 text-orange-500 text-right font-black">${wt.trim()}</td>
                                    </tr>`;
                            }
                        });
                    }

                    // Transition to Profile
                    loginSection.classList.add('hidden');
                    profileDisplay.classList.remove('hidden');
                    window.scrollTo(0, 0);

                } else {
                    errorMsg.classList.remove('hidden');
                    loginBtn.innerText = "View My Transformation";
                    loginBtn.style.opacity = "1";
                }
            } catch (error) {
                console.error("API Error:", error);
                errorMsg.innerText = "Database Connection Error";
                errorMsg.classList.remove('hidden');
                loginBtn.innerText = "View My Transformation";
                loginBtn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
