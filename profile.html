<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FMS | Client Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .rose-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .accent-orange { color: #ff4d00; }
        .btn-press:active { transform: scale(0.96); }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; outline: none; width: 100%; }
        input:focus { border-color: #ff4d00; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6">

    <section id="login-section" class="max-w-md mx-auto pt-20 text-center">
        <div class="rose-gradient w-16 h-16 rounded-2xl flex items-center justify-center font-black italic text-white mx-auto mb-6">FS</div>
        <h2 class="text-3xl font-black uppercase italic tracking-tighter mb-2">Client <span class="accent-orange">Portal</span></h2>
        <p class="text-neutral-500 text-xs font-bold uppercase tracking-widest mb-8">Enter your ID to track progress</p>
        
        <div class="flex flex-col gap-4">
            <input type="text" id="clientIdInput" placeholder="Enter Client ID (e.g., 1)">
            <button onclick="fetchClientData()" class="rose-gradient py-4 rounded-xl font-black uppercase text-xs tracking-widest btn-press text-white">
                View My Transformation
            </button>
        </div>
        <p id="errorMessage" class="text-rose-500 text-[10px] mt-4 font-bold uppercase hidden">Client ID not found. Try again.</p>
    </section>

    <section id="profile-display" class="max-w-xl mx-auto mt-10 hidden">
        <button onclick="window.location.reload()" class="mb-6 text-neutral-500 font-black uppercase text-[10px] tracking-widest">← Back to Login</button>
        
        <h1 id="clientName" class="text-5xl font-black uppercase italic leading-none mb-2">Loading...</h1>
        <span id="package" class="bg-orange-600/20 text-[#ff4d00] px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Plan Name</span>

        <div class="grid grid-cols-2 gap-4 mt-8">
            <div class="glass p-5 text-center">
                <p class="text-[9px] font-black uppercase text-neutral-500 mb-1">Weight</p>
                <p class="text-2xl font-black italic"><span id="weight">--</span> <span class="text-xs">kg</span></p>
            </div>
            <div class="glass p-5 text-center">
                <p class="text-[9px] font-black uppercase text-neutral-500 mb-1">Height</p>
                <p class="text-2xl font-black italic"><span id="height">--</span> <span class="text-xs">cm</span></p>
            </div>
            <div class="glass p-5 text-center border-b-2 border-orange-600">
                <p class="text-[9px] font-black uppercase text-orange-500 mb-1">BMI Score</p>
                <p id="bmi" class="text-2xl font-black italic text-orange-500">--</p>
            </div>
            <div class="glass p-5 text-center">
                <p class="text-[9px] font-black uppercase text-neutral-500 mb-1">Fat %</p>
                <p class="text-2xl font-black italic"><span id="fat">--</span>%</p>
            </div>
        </div>

        <div class="mt-10">
            <h3 class="text-xs font-black uppercase text-orange-500 mb-4 tracking-widest">Workout Journal <span class="text-white">(Max Lifts)</span></h3>
            <div class="glass overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white/5 text-[10px] uppercase text-neutral-500">
                        <tr>
                            <th class="p-4">Exercise</th>
                            <th class="p-4">Heaviest</th>
                        </tr>
                    </thead>
                    <tbody id="journalBody" class="font-bold italic">
                        </tbody>
                </table>
            </div>
        </div>
    </section>

    <script>
        // REPLACE THIS URL with your actual SheetDB API URL
        const SHEETDB_URL = "https://sheetdb.io/api/v1/q4n4z3yr8dbyt"; 

        async function fetchClientData() {
            const id = document.getElementById('clientIdInput').value.trim();
            if (!id) return;

            try {
                const response = await fetch(`${SHEETDB_URL}?id=${id}`);
                const data = await response.json();

                if (data.length > 0) {
                    const client = data[0];

                    // Hide Login, Show Profile
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('profile-display').classList.remove('hidden');

                    // Map Basic Info
                    document.getElementById('clientName').innerText = client.name || "Client";
                    document.getElementById('package').innerText = client.package || "Active Plan";
                    document.getElementById('weight').innerText = client.weight || "0";
                    document.getElementById('height').innerText = client.height || "0";
                    document.getElementById('fat').innerText = client.fat_percent || "0";

                    // BMI Calculation Fix (parseFloat ensures they are numbers)
                    const w = parseFloat(client.weight);
                    const h = parseFloat(client.height);
                    if (w > 0 && h > 0) {
                        const bmiValue = (w / ((h / 100) ** 2)).toFixed(1);
                        document.getElementById('bmi').innerText = bmiValue;
                    }

                    // Workout Journal Fix (Looping through multiple entries)
                    const journalBody = document.getElementById('journalBody');
                    journalBody.innerHTML = ""; // Clear
                    
                    if (client.lifts) {
                        // Split by comma for multiple exercises
                        const liftArray = client.lifts.split(','); 
                        liftArray.forEach(item => {
                            if (item.includes(':')) {
                                const [ex, wt] = item.split(':');
                                journalBody.innerHTML += `
                                    <tr class="border-t border-white/5">
                                        <td class="p-4 text-white">${ex.trim()}</td>
                                        <td class="p-4 text-orange-500">${wt.trim()}</td>
                                    </tr>`;
                            }
                        });
                    }
                } else {
                    document.getElementById('errorMessage').classList.remove('hidden');
                }
            } catch (error) {
                console.error("API Error:", error);
                alert("Failed to connect to the database.");
            }
        }
    </script>
</body>
</html>
