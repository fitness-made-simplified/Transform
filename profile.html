<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FMS | Profile & Track</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .rose-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .pb-glow { background: rgba(225, 29, 72, 0.1); border-left: 3px solid #e11d48 !important; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; width: 100%; }
    </style>
</head>
<body class="pb-32 p-6">
    <div id="loader" class="text-center pt-20 font-black uppercase italic animate-pulse">Loading Profile...</div>

    <div id="main-content" class="hidden max-w-xl mx-auto">
        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[95%] z-50">
            <div class="glass flex justify-around items-center py-4 px-2 shadow-2xl border-white/10">
                <button onclick="showTab('view-profile')" class="flex flex-col items-center gap-1"><span class="text-[8px] font-black uppercase">Dashboard</span></button>
                <button onclick="showTab('view-track')" class="flex flex-col items-center gap-1"><span class="text-[8px] font-black uppercase">Track Lift</span></button>
                <button onclick="window.location.href='index.html'" class="flex flex-col items-center gap-1"><span class="text-[8px] font-black uppercase opacity-50">Logout</span></button>
            </div>
        </nav>

        <section id="view-profile" class="tab-content active">
            <h1 id="clientName" class="text-4xl font-black uppercase italic tracking-tighter mb-8">--</h1>
            
            <div class="grid grid-cols-2 gap-4 mb-8 text-white">
                <div class="glass p-5 text-center"><p class="text-[9px] uppercase text-neutral-500 mb-1">Weight</p><p class="text-2xl font-black italic"><span id="p-weight">--</span>kg</p></div>
                <div class="glass p-5 text-center border-b-2 border-rose-500"><p class="text-[9px] uppercase text-rose-500 mb-1">BMI Score</p><p id="p-bmi" class="text-2xl font-black italic text-rose-500">--</p></div>
            </div>

            <div class="mb-8">
                <h3 class="text-[10px] font-black uppercase text-rose-500 mb-3 tracking-widest italic">Today's Prescribed Plan</h3>
                <div class="glass p-6 border-l-2 border-rose-600">
                    <p id="p-schedule" class="text-sm font-bold italic text-neutral-200 leading-relaxed">No plan assigned for today.</p>
                </div>
            </div>

            <h3 class="text-[10px] font-black uppercase text-rose-500 mb-3 tracking-widest italic">Activity History & PBs</h3>
            <div class="glass overflow-hidden max-h-[400px] overflow-y-auto">
                <table class="w-full text-left text-sm"><tbody id="p-journal" class="font-bold italic text-neutral-300"></tbody></table>
            </div>
        </section>

        <section id="view-track" class="tab-content">
            <h2 class="text-3xl font-black italic uppercase mb-8">Activity <span class="text-rose-600">Track</span></h2>
            <div class="glass p-6">
                <div class="flex flex-col gap-3">
                    <input type="text" id="ex-name" placeholder="Exercise Name">
                    <div class="grid grid-cols-3 gap-3">
                        <input type="number" id="ex-sets" placeholder="Sets">
                        <input type="number" id="ex-reps" placeholder="Reps">
                        <input type="text" id="ex-weight" placeholder="Kg">
                    </div>
                    <button onclick="logWorkout()" id="addBtn" class="rose-gradient py-4 rounded-xl font-black uppercase text-xs text-white">Save Entry</button>
                </div>
                <div id="share-section" class="hidden mt-6 border-t border-white/10 pt-6">
                    <button id="whatsappBtn" class="w-full bg-[#25D366] py-4 rounded-xl font-black uppercase text-xs text-white">Share with Coach</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        const SHEETDB_URL = "https://sheetdb.io/api/v1/q4n4z3yr8dbyt";
        const urlParams = new URLSearchParams(window.location.search);
        const clientId = urlParams.get('id');
        let currentName = "";

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function loadData() {
            if(!clientId) { window.location.href='index.html'; return; }
            try {
                const res = await fetch(`${SHEETDB_URL}/search?id=${clientId}`);
                const data = await res.json();
                if(data.length > 0) {
                    const client = data[0];
                    currentName = client.name;
                    document.getElementById('clientName').innerText = currentName;
                    document.getElementById('p-weight').innerText = client.weight;
                    
                    // Update Schedule Section
                    if(client.schedule) {
                        document.getElementById('p-schedule').innerHTML = client.schedule.replace(/\n/g, '<br>');
                    }

                    // Calc BMI
                    const h = parseFloat(client.height), w = parseFloat(client.weight);
                    if(h>0) document.getElementById('p-bmi').innerText = (w/((h/100)**2)).toFixed(1);
                    
                    fetchHistory();
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                }
            } catch(e) { console.error(e); }
        }

        async function fetchHistory() {
            const res = await fetch(`${SHEETDB_URL}/search?id=${clientId}&sheet=Workouts`);
            const historyData = await res.json();
            const journal = document.getElementById('p-journal');
            journal.innerHTML = "";
            if (Array.isArray(historyData)) {
                const pbs = {};
                [...historyData].forEach(log => {
                    const w = parseFloat(log.weight) || 0;
                    if(!pbs[log.exercise] || w > pbs[log.exercise]) pbs[log.exercise] = w;
                });
                historyData.reverse().slice(0, 25).forEach(log => {
                    const curW = parseFloat(log.weight) || 0;
                    const pbBadge = (curW > 0 && curW === pbs[log.exercise]) ? '<span class="text-rose-500 ml-2">PB 🔥</span>' : '';
                    journal.innerHTML += `<tr class="border-t border-white/5 ${pbBadge?'pb-glow':''}">
                        <td class="p-4 uppercase text-[10px]">${log.exercise}${pbBadge}<br><span class="opacity-40 text-[8px]">${log.date}</span></td>
                        <td class="p-4 text-right text-xs text-rose-500">${log.sets}x${log.reps}<br><span class="text-white opacity-60">${log.weight}kg</span></td></tr>`;
                });
            }
        }

        async function logWorkout() {
            const name = document.getElementById('ex-name').value;
            const sets = document.getElementById('ex-sets').value;
            const reps = document.getElementById('ex-reps').value;
            const weight = document.getElementById('ex-weight').value;
            const btn = document.getElementById('addBtn');
            if(!name || !sets || !reps) return;
            btn.innerText = "SAVING...";

            await fetch(`${SHEETDB_URL}?sheet=Workouts`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ data: [{ id: clientId, date: new Date().toLocaleDateString('en-GB'), exercise: name, sets, reps, weight }] })
            });

            btn.innerText = "SAVED!";
            document.getElementById('share-section').classList.remove('hidden');
            document.getElementById('whatsappBtn').onclick = () => {
                const msg = `💪 *Workout Update: ${currentName}*\n\n✅ *Exercise:* ${name}\n🔢 *Volume:* ${sets} sets x ${reps} reps\n⚖️ *Weight:* ${weight}kg\n\n_FMS Simplified Portal_`;
                window.open(`https://wa.me/919899550279?text=${encodeURIComponent(msg)}`);
            };
            fetchHistory();
        }
        window.onload = loadData;
    </script>
</body>
</html>
