<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMS | Client Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .phase-card { transition: all 0.4s ease; cursor: pointer; border-left: 4px solid rgba(255,255,255,0.05); margin-bottom: 12px; }
        .phase-card.active { border-left: 4px solid #e11d48; background: rgba(225, 29, 72, 0.05); }
        .phase-content { max-height: 0; opacity: 0; transition: all 0.5s ease; overflow: hidden; }
        .phase-card.active .phase-content { max-height: fit-content; opacity: 1; padding-top: 20px; padding-bottom: 10px; }
        .stat-label { font-size: 8px; font-weight: 900; text-transform: uppercase; color: #737373; letter-spacing: 0.1em; }
        .stat-value { font-size: 14px; font-weight: 900; font-style: italic; }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; color: white; font-size: 12px; width: 100%; outline: none; }
        .history-table { width: 100%; font-size: 11px; border-collapse: separate; border-spacing: 0 8px; }
        .history-table td { padding: 12px 8px; background: rgba(255,255,255,0.02); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-6 pb-32">

    <header class="mb-8">
        <h1 class="text-4xl font-black uppercase italic leading-none" id="dispName">Loading...</h1>
        <p class="text-[10px] font-black uppercase text-neutral-500 tracking-[0.2em] mt-3">Physio-Led Health Metrics</p>
    </header>

    <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="glass p-4">
            <p class="stat-label">Age / Height</p>
            <p class="stat-value"><span id="dispAge">0</span> <span class="opacity-30">/</span> <span id="dispHeight">0</span>cm</p>
        </div>
        <div class="glass p-4">
            <p class="stat-label">Weight / Fat %</p>
            <p class="stat-value"><span id="dispWeight">0</span>kg <span class="opacity-30">/</span> <span id="dispFat">0</span>%</p>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-8">
        <div class="glass p-4 border-b-2 border-rose-600">
            <p class="stat-label">Sessions</p>
            <p class="stat-value text-rose-500"><span id="dispUsed">0</span> <span class="text-white opacity-30 mx-1">/</span> <span id="dispTotal" class="text-white">0</span></p>
        </div>
        <div class="glass p-4 border-b-2 border-emerald-500">
            <p class="stat-label">Status</p>
            <p class="stat-value text-emerald-500 uppercase" id="dispStatus">---</p>
        </div>
    </div>

    <div class="glass p-6 mb-8 border-t-2 border-amber-500">
        <h3 class="text-xs font-black uppercase tracking-widest text-amber-500 italic mb-4">Performance Log</h3>
        
        <div class="space-y-3 mb-6 p-4 bg-white/5 rounded-2xl">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="newEx" placeholder="Exercise" class="input-field">
                <input type="number" id="newWeight" placeholder="Weight (kg)" class="input-field">
            </div>
            <button onclick="saveNewLift()" id="saveBtn" class="w-full bg-amber-500 text-black font-black py-3 rounded-xl text-[10px] uppercase italic">Update Personal Best</button>
        </div>

        <div class="max-h-[180px] overflow-y-auto no-scrollbar">
            <table class="history-table">
                <tbody id="historyBody">
                    <tr><td class="text-center opacity-30 italic py-4">Checking sheet records...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="protocolContainer" class="space-y-4"></div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/q4n4z3yr8dbyt';

        async function fetchUser() {
            const id = new URLSearchParams(window.location.search).get('id');
            if (!id) return;

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Flexible filter for Client_ID (removes spaces and ignores case)
                const allRows = data.filter(r => {
                    const cellId = r.Client_ID || r.client_id || r.CLIENT_ID || "";
                    return cellId.toString().trim().toLowerCase() === id.trim().toLowerCase();
                });
                
                // Find master row (row with the Name field)
                const master = allRows.find(r => r.Name || r.name);

                if (master) {
                    document.getElementById('dispName').innerText = master.Name || master.name;
                    document.getElementById('dispAge').innerText = master.Age || master.age || '0';
                    document.getElementById('dispHeight').innerText = master.Height || master.height || '0';
                    document.getElementById('dispWeight').innerText = master.Weight || master.weight || '0';
                    document.getElementById('dispFat').innerText = master.Fat_Percentage || master.fat_percentage || '0';
                    document.getElementById('dispUsed').innerText = master.Used_Sessions || master.used_sessions || '0';
                    document.getElementById('dispTotal').innerText = master.Total_Sessions || master.total_sessions || '0';
                    document.getElementById('dispStatus').innerText = master.Payment_Status || master.payment_status || '---';

                    // Find lifting logs (rows that have values in Exercise and Weight columns)
                    const logs = allRows.filter(r => (r.Exercise || r.exercise) && (r.Weight || r.weight));
                    renderHistory(logs);
                    renderTabs(master);
                } else {
                    document.getElementById('historyBody').innerHTML = '<tr><td class="text-center text-rose-500 py-4">ID NOT FOUND IN SHEET</td></tr>';
                }
            } catch (err) { console.error(err); }
        }

        async function saveNewLift() {
            const id = new URLSearchParams(window.location.search).get('id');
            const ex = document.getElementById('newEx').value;
            const wt = document.getElementById('newWeight').value;
            if (!ex || !wt) return alert("Please enter both exercise and weight");

            const btn = document.getElementById('saveBtn');
            btn.innerText = "Syncing with Google Sheets...";
            btn.disabled = true;

            const newRow = { 
                "Client_ID": id, 
                "Date": new Date().toLocaleDateString('en-GB'), 
                "Exercise": ex, 
                "Weight": wt 
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [newRow] })
                });
                if (res.ok) { 
                    alert("Success! Entry added to your sheet.");
                    location.reload(); 
                }
            } catch (err) { 
                alert("Sync Error. Check your internet.");
                btn.innerText = "Update Personal Best";
                btn.disabled = false;
            }
        }

        function renderHistory(logs) {
            const body = document.getElementById('historyBody');
            if(logs.length > 0) {
                // Shows newest log at the top
                body.innerHTML = logs.reverse().map(log => `
                    <tr>
                        <td class="font-bold text-neutral-600">${log.Date || log.date || '---'}</td>
                        <td class="font-black italic uppercase">${log.Exercise || log.exercise}</td>
                        <td class="text-amber-500 font-black">${log.Weight || log.weight}kg</td>
                    </tr>
                `).join('');
            } else {
                body.innerHTML = '<tr><td class="text-center opacity-30 italic py-4">No lifting logs found for this ID.</td></tr>';
            }
        }

        function renderTabs(u) {
            const container = document.getElementById('protocolContainer');
            let html = '';
            for(let i=1; i<=6; i++) {
                const diet = u[`Week${i}_Diet`] || u[`week${i}_diet`];
                const work = u[`Week${i}_Workout`] || u[`week${i}_workout`];
                if(diet || work) {
                    html += `
                    <div class="phase-card glass p-6" onclick="this.classList.toggle('active')">
                        <div class="flex justify-between items-center">
                            <div><p class="stat-label text-rose-500">Protocol Phase 0${i}</p><h3 class="text-xl font-black uppercase italic leading-none">Week ${i} Plan</h3></div>
                            <span class="text-rose-500 opacity-50">↓</span>
                        </div>
                        <div class="phase-content space-y-6">
                            <div><h4 class="stat-label text-rose-500 mb-2 border-b border-rose-600/10 pb-1">Nutrition</h4><div class="text-[13px] text-neutral-300 whitespace-pre-wrap leading-relaxed">${diet || '---'}</div></div>
                            <div><h4 class="stat-label text-rose-500 mb-2 border-b border-rose-600/10 pb-1">Training</h4><div class="text-[13px] text-neutral-300 whitespace-pre-wrap leading-relaxed">${work || '---'}</div></div>
                        </div>
                    </div>`;
                }
            }
            container.innerHTML = html;
        }
        fetchUser();
    </script>
</body>
</html>
