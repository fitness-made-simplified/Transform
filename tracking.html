<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMS | Performance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 14px; color: white; width: 100%; outline: none; }
        .pb-card { border-left: 4px solid #f59e0b; background: rgba(245, 158, 11, 0.05); margin-bottom: 12px; }
        .dropdown-content { display: none; }
        .dropdown-active .dropdown-content { display: block; }
    </style>
</head>
<body class="p-6 pb-20">

    <header class="mb-8 text-center">
        <a id="backBtn" href="#" class="text-amber-500 font-black uppercase text-[10px] tracking-widest mb-6 block">← Back to Profile</a>
        <h1 class="text-4xl font-black uppercase italic leading-tight">Member <span class="text-amber-500">Vault</span></h1>
        <p id="idTag" class="text-[9px] font-black uppercase text-neutral-500 tracking-[0.2em] mt-2">Syncing...</p>
    </header>

    <div class="glass p-6 mb-8 border-t-2 border-amber-500">
        <h3 class="text-[10px] font-black uppercase text-amber-500 mb-4 tracking-widest">Add New Exercise Log</h3>
        <div class="space-y-4">
            <input type="text" id="newEx" placeholder="Exercise (e.g. Squat)" class="input-field">
            <input type="number" id="newWeight" placeholder="Weight (kg)" class="input-field">
            <button onclick="saveLift()" id="saveBtn" class="w-full bg-amber-500 text-black font-black py-4 rounded-2xl text-xs uppercase italic active:scale-95 transition-transform">Sync to Sheet</button>
        </div>
    </div>

    <div class="space-y-4">
        <div class="flex justify-between items-center px-2">
            <h3 class="text-[10px] font-black uppercase text-neutral-500 tracking-widest">Personal Bests</h3>
            <span id="syncIndicator" class="text-[8px] font-bold text-amber-500 animate-pulse">Syncing...</span>
        </div>
        
        <div id="pbContainer" class="space-y-3">
            </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/q4n4z3yr8dbyt';
        const rawId = new URLSearchParams(window.location.search).get('id');
        const cleanId = rawId ? rawId.trim().toLowerCase() : null;

        document.getElementById('idTag').innerText = `ID: ${rawId || 'Missing'}`;
        if (rawId) document.getElementById('backBtn').href = `profile.html?id=${rawId}`;

        async function fetchRecords() {
            if (!cleanId) return;
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // SUPER FUZZY FILTER: Matches regardless of spaces or Case
                const userLogs = data.filter(r => {
                    const sheetId = (r.Client_ID || "").toString().trim().toLowerCase();
                    return sheetId === cleanId && (r.Exercise || r.Weight);
                });

                // Find Highest Weight per Exercise
                const pbs = {};
                userLogs.forEach(log => {
                    const ex = log.Exercise.trim().toUpperCase();
                    const wt = parseFloat(log.Weight || 0);
                    const dt = log.Date || '---';

                    if (!pbs[ex] || wt > pbs[ex].weight) {
                        pbs[ex] = { weight: wt, date: dt };
                    }
                });

                renderPBs(pbs);
                document.getElementById('syncIndicator').innerText = "Live Synced";
                document.getElementById('syncIndicator').classList.remove('animate-pulse');
            } catch (err) { 
                console.error(err);
                document.getElementById('syncIndicator').innerText = "Offline";
            }
        }

        function renderPBs(pbs) {
            const container = document.getElementById('pbContainer');
            const keys = Object.keys(pbs);
            
            if (keys.length === 0) {
                container.innerHTML = `<div class="glass p-10 text-center opacity-30 text-[10px] font-black uppercase italic leading-loose">No lifting data found in sheet<br>Log your first lift above!</div>`;
                return;
            }

            container.innerHTML = keys.map(ex => `
                <div class="glass p-5 pb-card">
                    <div class="flex justify-between items-center" onclick="this.parentElement.classList.toggle('dropdown-active')">
                        <div>
                            <p class="text-[7px] font-black text-amber-500/50 uppercase tracking-widest mb-1">RECORD PB</p>
                            <h4 class="text-sm font-black uppercase italic">${ex}</h4>
                        </div>
                        <div class="text-right">
                            <span class="text-2xl font-black italic text-white">${pbs[ex].weight}</span>
                            <span class="text-[9px] font-bold text-amber-500 ml-0.5">KG</span>
                        </div>
                    </div>
                    <div class="dropdown-content pt-4 mt-4 border-t border-white/5">
                        <div class="flex justify-between items-center">
                            <span class="text-[9px] font-black text-neutral-500 uppercase">Last Updated</span>
                            <span class="text-[10px] font-bold text-neutral-300">${pbs[ex].date}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function saveLift() {
            const ex = document.getElementById('newEx').value;
            const wt = document.getElementById('newWeight').value;
            const btn = document.getElementById('saveBtn');

            if (!ex || !wt) return alert("Enter Exercise and Weight");

            btn.innerText = "Syncing...";
            btn.disabled = true;

            const newRow = {
                "Client_ID": rawId,
                "Date": new Date().toLocaleDateString('en-GB'),
                "Exercise": ex,
                "Weight": wt
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [newRow] })
                });
                if (res.ok) { location.reload(); }
                else { throw new Error(); }
            } catch (err) { 
                alert("Sheet Connection Error"); 
                btn.innerText = "Sync to Sheet";
                btn.disabled = false;
            }
        }

        fetchRecords();
    </script>
</body>
</html>
