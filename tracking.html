<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMS | Performance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 14px; color: white; width: 100%; outline: none; }
        .pb-card { border-left: 4px solid #f59e0b; background: rgba(245, 158, 11, 0.05); transition: 0.3s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-6 pb-20">

    <header class="mb-8">
        <a id="backBtn" href="#" class="text-amber-500 font-black uppercase text-[10px] tracking-widest mb-6 block">← Back to Profile</a>
        <h1 class="text-4xl font-black uppercase italic leading-none">Personal <span class="text-amber-500">Bests</span></h1>
        <p class="text-[10px] font-black uppercase text-neutral-500 tracking-[0.2em] mt-3">Verified Performance Records</p>
    </header>

    <div class="glass p-6 mb-8 border-t-2 border-amber-500">
        <h3 class="text-[9px] font-black uppercase text-amber-500 mb-4 tracking-widest">Add New Log</h3>
        <div class="space-y-4">
            <input type="text" id="newEx" placeholder="Exercise Name" class="input-field">
            <input type="number" id="newWeight" placeholder="Weight (kg)" class="input-field">
            <button onclick="saveLift()" id="saveBtn" class="w-full bg-amber-500 text-black font-black py-4 rounded-2xl text-xs uppercase italic active:scale-95 transition-transform">Update Sheet</button>
        </div>
    </div>

    <div class="space-y-3">
        <div class="flex justify-between items-center px-2">
            <h3 class="text-[9px] font-black uppercase text-neutral-500 tracking-widest">PB Record History</h3>
            <span id="syncStatus" class="text-[8px] font-bold text-amber-500 uppercase">Checking...</span>
        </div>
        <div id="pbContainer" class="space-y-3">
            </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/q4n4z3yr8dbyt';
        const clientId = new URLSearchParams(window.location.search).get('id');

        if (clientId) { document.getElementById('backBtn').href = `profile.html?id=${clientId}`; }

        async function fetchRecords() {
            if (!clientId) return;
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Exact Column Mapping from your screenshot
                const userLogs = data.filter(r => 
                    r.Client_ID && r.Client_ID.toString().trim().toLowerCase() === clientId.toLowerCase() && 
                    r.Exercise && r.Weight
                );

                // Group by Exercise and find the MAX weight for each
                const pbs = {};
                userLogs.forEach(log => {
                    const name = log.Exercise.toUpperCase().trim();
                    const weight = parseFloat(log.Weight);
                    const date = log.Date || '---';

                    if (!pbs[name] || weight > pbs[name].weight) {
                        pbs[name] = { weight: weight, date: date };
                    }
                });

                renderPBs(pbs);
                document.getElementById('syncStatus').innerText = "Live Synced";
            } catch (err) { 
                console.error(err);
                document.getElementById('syncStatus').innerText = "Sync Offline";
            }
        }

        function renderPBs(pbs) {
            const container = document.getElementById('pbContainer');
            const exercises = Object.keys(pbs);
            
            if (exercises.length === 0) {
                container.innerHTML = `<div class="glass p-10 text-center opacity-30 text-[10px] font-black uppercase">No logs found in sheet</div>`;
                return;
            }

            container.innerHTML = exercises.map(ex => `
                <div class="glass p-5 pb-card flex justify-between items-center">
                    <div>
                        <p class="text-[7px] font-black text-neutral-500 uppercase tracking-widest mb-1">Achieved: ${pbs[ex].date}</p>
                        <h4 class="text-sm font-black uppercase italic">${ex}</h4>
                    </div>
                    <div class="text-right">
                        <span class="text-2xl font-black italic text-white">${pbs[ex].weight}</span>
                        <span class="text-[9px] font-bold text-amber-500 ml-0.5">KG</span>
                    </div>
                </div>
            `).join('');
        }

        async function saveLift() {
            const ex = document.getElementById('newEx').value;
            const wt = document.getElementById('newWeight').value;
            const btn = document.getElementById('saveBtn');

            if (!ex || !wt) return alert("Fill Exercise & Weight");

            btn.innerText = "Syncing...";
            btn.disabled = true;

            const newEntry = {
                "Client_ID": clientId,
                "Date": new Date().toLocaleDateString('en-GB'),
                "Exercise": ex,
                "Weight": wt
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [newEntry] })
                });
                if (res.ok) { 
                    location.reload(); 
                }
            } catch (err) { 
                alert("SheetDB Connection Error"); 
                btn.disabled = false;
                btn.innerText = "Update Sheet";
            }
        }

        fetchRecords();
    </script>
</body>
</html>
