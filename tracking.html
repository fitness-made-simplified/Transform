<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMS | Performance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 14px; color: white; width: 100%; outline: none; }
        .input-field:focus { border-color: #f59e0b; }
        .pb-card { border-left: 4px solid #f59e0b; background: rgba(245, 158, 11, 0.05); transition: all 0.3s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-6 pb-20">

    <header class="mb-8">
        <a id="backBtn" href="#" class="text-amber-500 font-black uppercase text-[10px] tracking-widest mb-6 block">← Back to Profile</a>
        <h1 class="text-4xl font-black uppercase italic leading-none">Your <span class="text-amber-500">Records</span></h1>
        <p class="text-[10px] font-black uppercase text-neutral-500 tracking-[0.2em] mt-3">Personal Bests & Sync</p>
    </header>

    <div class="glass p-6 mb-8 border-t-2 border-amber-500">
        <h3 class="text-[10px] font-black uppercase text-amber-500 mb-4 tracking-widest">Update New Record</h3>
        <div class="space-y-4">
            <input type="text" id="newEx" placeholder="Exercise (e.g. Bench Press)" class="input-field">
            <input type="number" id="newWeight" placeholder="Weight (kg)" class="input-field">
            <button onclick="saveLift()" id="saveBtn" class="w-full bg-amber-500 text-black font-black py-4 rounded-2xl text-xs uppercase italic tracking-wider active:scale-95 transition-transform">Sync with Sheet</button>
        </div>
    </div>

    <div class="space-y-3">
        <h3 class="text-[10px] font-black uppercase text-neutral-500 ml-2 tracking-widest">Current Personal Bests</h3>
        <div id="pbContainer" class="space-y-3">
            <div class="text-center py-10 opacity-30 text-[10px] font-black uppercase tracking-widest">Syncing Data...</div>
        </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/q4n4z3yr8dbyt';
        const clientId = new URLSearchParams(window.location.search).get('id');

        if (clientId) { document.getElementById('backBtn').href = `profile.html?id=${clientId}`; }

        async function fetchRecords() {
            if (!clientId) return;
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Filter rows for this client that have an exercise logged
                const userLogs = data.filter(r => 
                    (r.Client_ID || "").toString().toLowerCase() === clientId.toLowerCase() && 
                    (r.Exercise || r.exercise)
                );

                // Logic to find the MAX weight for each unique exercise
                const pbs = {};
                userLogs.forEach(log => {
                    const ex = (log.Exercise || log.exercise).toUpperCase();
                    const wt = parseFloat(log.Weight || log.weight || 0);
                    if (!pbs[ex] || wt > pbs[ex].weight) {
                        pbs[ex] = { weight: wt, date: log.Date || log.date || '---' };
                    }
                });

                renderPBs(pbs);
            } catch (err) { console.error("Sync Error:", err); }
        }

        function renderPBs(pbs) {
            const container = document.getElementById('pbContainer');
            const keys = Object.keys(pbs);
            
            if (keys.length === 0) {
                container.innerHTML = `<div class="glass p-6 text-center opacity-40 text-[10px] font-black uppercase">No records found for this ID</div>`;
                return;
            }

            container.innerHTML = keys.map(ex => `
                <div class="glass p-5 pb-card flex justify-between items-center">
                    <div>
                        <p class="text-[8px] font-black text-amber-500/50 uppercase tracking-widest mb-1">${pbs[ex].date}</p>
                        <h4 class="text-sm font-black uppercase italic">${ex}</h4>
                    </div>
                    <div class="text-right">
                        <span class="text-2xl font-black italic text-white">${pbs[ex].weight}</span>
                        <span class="text-[10px] font-bold text-amber-500 ml-1">KG</span>
                    </div>
                </div>
            `).join('');
        }

        async function saveLift() {
            const ex = document.getElementById('newEx').value;
            const wt = document.getElementById('newWeight').value;
            const btn = document.getElementById('saveBtn');

            if (!ex || !wt) { alert("Please enter both Exercise and Weight"); return; }

            btn.innerText = "Syncing...";
            btn.disabled = true;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        data: [{
                            "Client_ID": clientId,
                            "Date": new Date().toLocaleDateString('en-GB'),
                            "Exercise": ex,
                            "Weight": wt
                        }]
                    })
                });
                if (res.ok) { 
                    alert("Record Updated!"); 
                    location.reload(); 
                }
            } catch (err) { 
                alert("Error Syncing"); 
                btn.innerText = "Sync with Sheet";
                btn.disabled = false;
            }
        }

        fetchRecords();
    </script>
</body>
</html>
