<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMS | AI Virtual Trainer</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* ✅ SAME DESIGN — NO CHANGE */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
body {background:#050505;color:#fff;font-family:'Inter';display:flex;flex-direction:column;height:100vh}
.header{padding:14px 18px;display:flex;gap:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.avatar{width:40px;height:40px;background:#e11d48;border-radius:12px;display:flex;align-items:center;justify-content:center}
.msg-counter{font-size:9px;background:rgba(225,29,72,.12);padding:4px 10px;border-radius:99px}
#chatArea{flex:1;overflow:auto;padding:16px}
.bubble{padding:12px;border-radius:16px;margin-bottom:10px}
.bot{background:#111}
.user{background:#e11d48}
.input-bar{display:flex;padding:10px;border-top:1px solid #222}
textarea{flex:1;background:#111;border:none;color:#fff;padding:10px}
button{background:#e11d48;padding:10px;border-radius:10px}
</style>
</head>

<body>

<div class="header">
<div class="avatar">💪</div>
<div>FMS Trainer</div>
<div class="msg-counter" id="msgCounter">15 free</div>
</div>

<div id="chatArea">
<div class="bubble bot">
<strong>Welcome to FMS AI Trainer</strong><br><br>
Tell me:
- Age  
- Weight  
- Goal  
- Experience  
</div>
</div>

<div class="input-bar">
<textarea id="msgInput"></textarea>
<button onclick="sendMessage()">➤</button>
</div>

<!-- PAYWALL -->
<div id="paywall" style="display:none;position:fixed;bottom:0;width:100%;background:#000;padding:20px">
<h3>Unlock More Messages</h3>
<p>Enter code after payment</p>
<input id="unlockCode" placeholder="Enter code">
<button onclick="unlock()">Unlock</button>
</div>

<script>

// ✅ YOUR CLOUDFLARE WORKER URL
const API_URL = "https://your-cloudflare-link.workers.dev";

const FREE_LIMIT = 15;
const CODE = "fms99open";

let msgCount = 0;
let unlocked = false;
let history = [];

function updateCounter(){
document.getElementById("msgCounter").innerText = unlocked ? "Unlimited" : (FREE_LIMIT - msgCount)+" free";
}

function addMessage(text,role){
let div=document.createElement("div");
div.className="bubble "+role;
div.innerText=text;
document.getElementById("chatArea").appendChild(div);
}

async function sendMessage(){

if(!unlocked && msgCount>=FREE_LIMIT){
document.getElementById("paywall").style.display="block";
return;
}

let input=document.getElementById("msgInput");
let text=input.value.trim();
if(!text) return;

addMessage(text,"user");
input.value="";

msgCount++;
updateCounter();

try{
let res=await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:text,
history:history
})
});

let data=await res.json();

let reply=data.reply || "Error";

history.push({role:"user",parts:[{text}]});
history.push({role:"model",parts:[{text:reply}]});

addMessage(reply,"bot");

}catch(e){
addMessage("Server error","bot");
}

}

function unlock(){
let code=document.getElementById("unlockCode").value;

if(code===CODE){
unlocked=true;
document.getElementById("paywall").style.display="none";
updateCounter();
addMessage("Unlocked successfully. Continue your plan.","bot");
}else{
alert("Invalid code");
}
}

updateCounter();

</script>

</body>
</html>
