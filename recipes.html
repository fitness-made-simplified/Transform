<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMS | Fit Fuel Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; padding: 20px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        
        .recipe-card { margin-bottom: 16px; transition: all 0.3s ease; overflow: hidden; }
        .recipe-details { display: none; padding-top: 20px; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .recipe-card.active .recipe-details { display: block; animation: slideDown 0.3s ease-out; }

        .filter-btn { border: 1px solid rgba(255, 255, 255, 0.1); }
        .filter-btn.active { background: #e11d48; color: white; border-color: #e11d48; }
        
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">
    <header class="mb-6">
        <a href="index.html" class="text-rose-500 font-black uppercase text-[10px] tracking-widest mb-4 block">← Back</a>
        <h1 class="text-4xl font-black uppercase italic leading-none mb-1">FIT <span class="text-rose-600">FUEL</span></h1>
        <p class="text-[10px] font-black uppercase text-neutral-500 italic tracking-widest">Physio-Approved Nutrition</p>
    </header>

    <div class="mb-6">
        <input type="text" id="recipeSearch" onkeyup="searchRecipes()" placeholder="Search ingredients..." class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm text-white outline-none focus:border-rose-600">
    </div>

    <div class="flex gap-2 mb-8 overflow-x-auto pb-2 no-scrollbar">
        <button onclick="filterRecipes('all', this)" class="filter-btn active whitespace-nowrap px-6 py-3 glass font-black uppercase text-[10px] rounded-xl transition-all">All</button>
        <button onclick="filterRecipes('lean', this)" class="filter-btn whitespace-nowrap px-6 py-3 glass font-black uppercase text-[10px] rounded-xl transition-all">Fat Loss</button>
        <button onclick="filterRecipes('detox', this)" class="filter-btn whitespace-nowrap px-6 py-3 glass font-black uppercase text-[10px] rounded-xl transition-all">Detox</button>
        <button onclick="filterRecipes('bulk', this)" class="filter-btn whitespace-nowrap px-6 py-3 glass font-black uppercase text-[10px] rounded-xl transition-all">Budget Bulk</button>
    </div>

    <div id="recipeGrid"></div>

    <script>
        const recipes = [
            { cat: 'lean', name: 'Paneer Bhurji (Low Fat)', cals: '220', prot: '18g', ing: 'Low-fat paneer (100g), Onion, Tomato, Capsicum, Spices, Olive oil (1tsp)', prep: 'Heat oil, sauté veggies 3m, add spices, crumble paneer and cook 4m.', ben: 'High protein, muscle retention.' },
            { cat: 'lean', name: 'Egg White Veg Omelette', cals: '120', prot: '20g', ing: '4 Egg whites, Spinach, Onion, Tomato', prep: 'Mix ingredients, pour on non-stick pan, cook both sides.', ben: 'Ultra low calorie breakfast.' },
            { cat: 'lean', name: 'Grilled Chicken Salad', cals: '250', prot: '35g', ing: 'Chicken breast (150g), Lettuce, Cucumber, Lemon', prep: 'Grill chicken, chop veggies, mix with lemon juice.', ben: 'Lean protein source.' },
            { cat: 'lean', name: 'Moong Dal Chilla', cals: '180', prot: '14g', ing: 'Soaked moong dal (1 cup), Ginger, Green chilli', prep: 'Blend to batter, spread on pan, cook both sides.', ben: 'Plant protein, easy digestion.' },
            { cat: 'lean', name: 'Oats Vegetable Upma', cals: '200', prot: '8g', ing: 'Oats (40g), Mixed veggies, Curry leaves', prep: 'Dry roast oats, cook veggies with spices, mix and cook.', ben: 'High fiber, keeps you full.' },
            { cat: 'lean', name: 'Soya Chunk Stir Fry', cals: '220', prot: '25g', ing: 'Soya chunks (50g), Onion, Spices', prep: 'Boil soya, squeeze water, stir fry with spices.', ben: 'Muscle recovery, fat loss friendly.' },
            { cat: 'lean', name: 'Greek Yogurt Bowl', cals: '180', prot: '15g', ing: 'Hung curd (200g), Chia seeds, Fruits', prep: 'Mix everything in a bowl.', ben: 'Gut-friendly snack.' },
            { cat: 'lean', name: 'Boiled Egg + Salad', cals: '160', prot: '12g', ing: '2 Eggs, fresh salad veggies', prep: 'Boil eggs, serve with salad.', ben: 'Simple & protein rich.' },
            { cat: 'lean', name: 'Tofu Stir Fry', cals: '180', prot: '15g', ing: 'Tofu (100g), Mixed vegetables, Soy sauce', prep: 'Stir fry tofu and veggies on high heat.', ben: 'Vegan protein, low calorie.' },
            { cat: 'lean', name: 'Chicken Soup', cals: '150', prot: '25g', ing: 'Chicken (100g), Garlic, Ginger, Salt, Pepper', prep: 'Boil all ingredients, simmer for 15 minutes.', ben: 'Light & boosts immunity.' },
            { cat: 'detox', name: 'Jeera Water', cals: '5', prot: '0g', ing: 'Cumin seeds (1tsp), Water', prep: 'Soak overnight, boil and drink.', ben: 'Reduces bloating.' },
            { cat: 'detox', name: 'Lemon Honey Water', cals: '30', prot: '0g', ing: 'Warm water, Lemon, Honey (1tsp)', prep: 'Mix and drink in the morning.', ben: 'Boosts metabolism.' },
            { cat: 'detox', name: 'Cucumber Mint Water', cals: '10', prot: '0g', ing: 'Cucumber slices, Mint leaves, Water', prep: 'Infuse overnight and drink.', ben: 'Hydration & water retention.' },
            { cat: 'detox', name: 'ACV Elixir', cals: '5', prot: '0g', ing: 'ACV (1tbsp), Warm water', prep: 'Drink 20 mins before meals.', ben: 'Controls appetite.' },
            { cat: 'detox', name: 'Green Tea', cals: '2', prot: '0g', ing: 'Green tea bag, Water', prep: 'Brew for 2-3 mins.', ben: 'Antioxidant rich.' },
            { cat: 'bulk', name: 'Peanut Banana Shake', cals: '400', prot: '15g', ing: 'Milk (300ml), Banana, Peanut butter', prep: 'Blend all ingredients together.', ben: 'High calorie mass gain.' },
            { cat: 'bulk', name: 'Soya Curry + Rice', cals: '500', prot: '30g', ing: 'Soya chunks, Rice, Spices', prep: 'Cook soya curry and serve with rice.', ben: 'Muscle building budget meal.' },
            { cat: 'bulk', name: 'Egg Bhurji + Roti', cals: '450', prot: '25g', ing: '3 Eggs, 2 Roti, Onion', prep: 'Cook bhurji, serve with roti.', ben: 'Balanced performance meal.' },
            { cat: 'bulk', name: 'Dal Khichdi', cals: '450', prot: '18g', ing: 'Rice, Dal, Ghee', prep: 'Cook together in pressure cooker.', ben: 'Easy to digest mass.' },
            { cat: 'bulk', name: 'Paneer Rice Bowl', cals: '500', prot: '20g', ing: 'Paneer (100g), Rice, Spices', prep: 'Cook paneer and mix with rice.', ben: 'High calorie veg gain.' }
        ];

        function renderRecipes() {
            const grid = document.getElementById('recipeGrid');
            grid.innerHTML = recipes.map(r => `
                <div class="recipe-card glass p-6" data-category="${r.cat}" onclick="this.classList.toggle('active')">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[8px] font-black uppercase tracking-widest ${r.cat === 'lean' ? 'text-rose-500' : r.cat === 'bulk' ? 'text-amber-500' : 'text-emerald-500'}">
                                ${r.cat.toUpperCase()}
                            </span>
                            <h3 class="text-xl font-black uppercase italic mt-1">${r.name}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] text-neutral-500 font-black uppercase">Calories</p>
                            <p class="text-lg font-black italic text-rose-500 leading-none">${r.cals}</p>
                        </div>
                    </div>
                    
                    <div class="flex gap-4 mt-4">
                         <div class="bg-white/5 px-3 py-1 rounded-full border border-white/10">
                            <span class="text-[8px] uppercase text-neutral-400 mr-1">Protein</span>
                            <span class="text-xs font-bold">${r.prot}</span>
                         </div>
                         <p class="text-[9px] text-rose-600 font-black uppercase ml-auto self-center tracking-tighter">Tap to view recipe ↓</p>
                    </div>

                    <div class="recipe-details">
                        <div class="space-y-4">
                            <div>
                                <h4 class="text-[9px] font-black uppercase text-rose-500 tracking-widest mb-1">Ingredients</h4>
                                <p class="text-xs text-neutral-300 leading-relaxed">${r.ing}</p>
                            </div>
                            <div>
                                <h4 class="text-[9px] font-black uppercase text-rose-500 tracking-widest mb-1">Preparation</h4>
                                <p class="text-xs text-neutral-300 leading-relaxed">${r.prep}</p>
                            </div>
                            <div class="bg-rose-600/10 p-3 rounded-xl border border-rose-600/20">
                                <h4 class="text-[9px] font-black uppercase text-rose-500 tracking-widest mb-1">Clinical Benefit</h4>
                                <p class="text-xs italic text-neutral-200">${r.ben}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterRecipes(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.recipe-card').forEach(card => {
                card.style.display = (cat === 'all' || card.dataset.category === cat) ? 'block' : 'none';
            });
        }

        function searchRecipes() {
            let q = document.getElementById('recipeSearch').value.toLowerCase();
            document.querySelectorAll('.recipe-card').forEach(card => {
                let name = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = name.includes(q) ? 'block' : 'none';
            });
        }

        renderRecipes();
    </script>
</body>
</html>
