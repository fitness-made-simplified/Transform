<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FMS AI COACH | Physio-Led</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        .rose-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .chat-bubble { border-radius: 20px; max-width: 85%; padding: 12px 16px; font-size: 14px; line-height: 1.5; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; }
        .ai-msg { background: #111; border: 1px solid #222; border-top-left-radius: 4px; color: #eee; }
        .user-msg { background: #e11d48; color: white; border-top-right-radius: 4px; align-self: flex-end; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .typing { display: flex; gap: 4px; padding: 10px 0; }
        .dot { width: 5px; height: 5px; background: #e11d48; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.4); opacity: 0.4; } 40% { transform: scale(1.1); opacity: 1; } }
        #chat-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
        footer { padding: 12px; background: #0a0a0a; border-top: 1px solid #1a1a1a; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
        .limit-overlay { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; border-radius: 24px; border: 1px solid #333; margin: 10px; }
    </style>
</head>
<body class="max-w-lg mx-auto border-x border-[#111]">

    <header class="p-4 border-b border-[#222] flex items-center justify-between bg-[#050505] shrink-0">
        <div class="flex items-center gap-3">
            <a href="index.html" class="p-1"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="m15 18-6-6 6-6"/></svg></a>
            <div>
                <h1 class="text-sm font-black italic uppercase tracking-tighter">Sushant <span class="text-rose-600">AI</span></h1>
                <p id="msg-counter" class="text-[8px] font-bold text-neutral-500 uppercase tracking-widest">15 Messages Left</p>
            </div>
        </div>
        <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981] animate-pulse"></div>
    </header>

    <div id="chat-container" class="no-scrollbar">
        <div class="chat-bubble ai-msg">Namaste! Main Coach Sushant ka AI hoon. Training (Chest/Back), Fat Loss, ya Physiotherapy ke liye puchiye. 💪</div>
    </div>

    <div id="typing-area" class="hidden px-6">
        <div class="typing"><div class="dot" style="animation-delay:-0.32s"></div><div class="dot" style="animation-delay:-0.16s"></div><div class="dot"></div></div>
    </div>

    <footer id="input-footer">
        <form id="chat-form" class="flex gap-2">
            <input type="text" id="user-input" autocomplete="off" placeholder="Ask about workouts, diet..." class="flex-1 bg-[#161616] border border-[#222] rounded-xl px-5 py-3.5 text-sm text-white focus:border-rose-600 outline-none">
            <button type="submit" class="rose-gradient w-12 h-12 rounded-xl flex items-center justify-center active:scale-90 transition-transform shrink-0">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </form>
    </footer>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('user-input');
        const typingArea = document.getElementById('typing-area');
        const counterEl = document.getElementById('msg-counter');
        const footer = document.getElementById('input-footer');

        const HF_TOKEN = "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"; 
        let messageCount = localStorage.getItem('fms_msg_count') ? parseInt(localStorage.getItem('fms_msg_count')) : 0;
        const MAX_MESSAGES = 15;

        function updateCounter() {
            const left = MAX_MESSAGES - messageCount;
            counterEl.textContent = `${left > 0 ? left : 0} Messages Left`;
            if (messageCount >= MAX_MESSAGES) showPaywall();
        }

        function showPaywall() {
            footer.innerHTML = `
                <div class="limit-overlay">
                    <p class="text-xs font-bold mb-3 uppercase tracking-widest text-rose-500">Free Limit Reached</p>
                    <p class="text-[10px] opacity-70 mb-4 px-4">Coach ki depth knowledge continue karne ke liye ₹100 pay karein ya WhatsApp join karein.</p>
                    <div class="flex gap-2 w-full px-2">
                        <a href="upi://pay?pa=9899550279@ptsbi&pn=Sushant%20Sehgal&am=100&cu=INR" class="flex-1 rose-gradient py-3 rounded-xl text-[10px] font-black uppercase text-center">Unlock Full Access (₹100)</a>
                        <a href="https://wa.me/919899550279" class="bg-emerald-600 py-3 px-4 rounded-xl text-[10px] font-black uppercase text-center">WhatsApp</a>
                    </div>
                </div>`;
        }

        async function getAIResponse(message) {
            const model = "meta-llama/Meta-Llama-3-8B-Instruct";
            const url = `https://api-inference.huggingface.co/models/${model}`;
            
            const systemPrompt = "You are Coach Sushant (FMS Brand), a Physiotherapist & Elite Fitness Coach. Expert in Chest/Back workouts, HIIT, and Fat Loss. Use Hinglish. Clinical but motivating. Concise answers with form cues.";

            const response = await fetch(url, {
                method: "POST",
                headers: { "Authorization": `Bearer ${HF_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    inputs: `<|begin_of_text|><|start_header_id|>system<|end_header_id|>\n\n${systemPrompt}<|eot_id|><|start_header_id|>user<|end_header_id|>\n\n${message}<|eot_id|><|start_header_id|>assistant<|end_header_id|>`,
                    parameters: { max_new_tokens: 350, temperature: 0.6 }
                }),
            });

            const result = await response.json();
            return result[0].generated_text.split("<|start_header_id|>assistant<|end_header_id|>")[1].trim();
        }

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-bubble ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
            msgDiv.textContent = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text || messageCount >= MAX_MESSAGES) return;

            appendMessage('user', text);
            input.value = '';
            messageCount++;
            localStorage.setItem('fms_msg_count', messageCount);
            updateCounter();

            typingArea.classList.remove('hidden');
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });

            try {
                const aiResponse = await getAIResponse(text);
                typingArea.classList.add('hidden');
                appendMessage('ai', aiResponse);
            } catch (err) {
                typingArea.classList.add('hidden');
                appendMessage('ai', "Server thoda heavy hai, please ek minute baad try karein.");
            }
        };

        updateCounter();
        
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + 'px';
                chatContainer.scrollTo({ top: chatContainer.scrollHeight });
            });
        }
    </script>
</body>
</html>
