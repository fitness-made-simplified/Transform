<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FMS AI COACH | Global Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', system-ui, sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        .rose-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .chat-bubble { border-radius: 20px; max-width: 85%; padding: 14px 18px; font-size: 15px; line-height: 1.5; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        .ai-msg { background: #121212; border-top-left-radius: 4px; color: #eee; }
        .user-msg { background: #e11d48; color: white; border-top-right-radius: 4px; align-self: flex-end; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .typing { display: flex; gap: 5px; padding: 12px 0; }
        .dot { width: 6px; height: 6px; background: #e11d48; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }
        footer { padding: 16px; background: #0a0a0a; border-top: 1px solid #1a1a1a; padding-bottom: max(16px, env(safe-area-inset-bottom)); }
        .paywall { background: rgba(10,10,10,0.98); backdrop-filter: blur(20px); padding: 28px; border-radius: 28px; border: 1px solid #333; text-align: center; }
    </style>
</head>
<body class="max-w-lg mx-auto border-x border-[#111]">

    <header class="p-4 border-b border-[#222] flex items-center justify-between bg-[#050505] shrink-0 z-50">
        <div class="flex items-center gap-3">
            <a href="index.html" class="p-1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></a>
            <div>
                <h1 class="text-sm font-black italic uppercase tracking-tighter">Sushant <span class="text-rose-600">AI</span></h1>
                <p id="counter-badge" class="text-[9px] font-bold text-neutral-500 bg-[#111] px-2 py-0.5 rounded border border-[#222]">READY</p>
            </div>
        </div>
        <div id="status-light" class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"></div>
    </header>

    <div id="chat-container" class="no-scrollbar">
        <div class="chat-bubble ai-msg">Yo! I'm your FMS AI Coach. Ready to crush some goals? Whether it's fixing back pain, smashing chest day, or dialling in fat loss—I've got you. What's on your mind today? 🔥</div>
    </div>

    <div id="typing-area" class="hidden px-8"><div class="typing"><div class="dot" style="animation-delay:-0.32s"></div><div class="dot" style="animation-delay:-0.16s"></div><div class="dot"></div></div></div>

    <footer id="footer-logic">
        <form id="chat-form" class="flex gap-3">
            <input type="text" id="user-input" autocomplete="off" placeholder="What are we working on?" class="flex-1 bg-[#141414] border border-[#222] rounded-2xl px-5 py-4 text-sm text-white focus:border-rose-600 outline-none">
            <button type="submit" class="rose-gradient w-14 h-14 rounded-2xl flex items-center justify-center shrink-0">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </form>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const inputField = document.getElementById('user-input');
        const typingArea = document.getElementById('typing-area');
        const badge = document.getElementById('counter-badge');
        const footer = document.getElementById('footer-logic');
        const statusLight = document.getElementById('status-light');

        const WORKER_URL = "https://fms-gemini-proxy.gignlearn.workers.dev";
        const MAX_FREE = 15;
        let usedCount = localStorage.getItem('fms_global_or_v1') ? parseInt(localStorage.getItem('fms_global_or_v1')) : 0;
        let chatHistory = [];

        function refreshUI() {
            const left = MAX_FREE - usedCount;
            badge.textContent = `${left > 0 ? left : 0} FREE TIPS LEFT`;
            if (usedCount >= MAX_FREE) {
                footer.innerHTML = `<div class="paywall mx-2 mb-2"><h3 class="text-sm font-black uppercase text-rose-500 mb-2">Limit Reached</h3><p class="text-xs text-neutral-400 mb-6">Upgrade for ₹100 to keep the progress going.</p><div class="flex flex-col gap-3"><a href="upi://pay?pa=9899550279@ptsbi&pn=Sushant%20Sehgal&am=100&cu=INR" class="rose-gradient py-4 rounded-2xl text-[11px] font-black uppercase text-center">Unlock Access (₹100)</a><a href="https://wa.me/919899550279" class="bg-[#1a1a1a] border border-[#333] py-4 rounded-2xl text-[11px] font-black uppercase text-center">WhatsApp Coach</a></div></div>`;
            }
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `chat-bubble ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        async function sendToWorker(userMessage) {
            statusLight.classList.replace('bg-emerald-500', 'bg-yellow-500');

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages: chatHistory })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Proxy error");
                }

                statusLight.classList.replace('bg-yellow-500', 'bg-emerald-500');
                return data.reply;

            } catch (e) {
                console.error(e);
                statusLight.classList.replace('bg-yellow-500', 'bg-rose-500');
                return "My bad, brother! Connection issue with the coach. Try again or ping me on WhatsApp! ⚡";
            }
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const val = inputField.value.trim();
            if (!val || usedCount >= MAX_FREE) return;

            addMessage('user', val);
            inputField.value = '';
            usedCount++;
            localStorage.setItem('fms_global_or_v1', usedCount);
            refreshUI();

            typingArea.classList.remove('hidden');
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });

            // Add to history before sending
            chatHistory.push({ role: "user", parts: [{ text: val }] });

            const reply = await sendToWorker(val);

            typingArea.classList.add('hidden');
            addMessage('ai', reply);

            // Add AI reply to history
            chatHistory.push({ role: "model", parts: [{ text: reply }] });

            // Keep history reasonable
            if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
        };

        refreshUI();
    </script>
</body>
</html>
