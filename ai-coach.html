<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FMS AI COACH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; overflow: hidden; }
        .rose-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .chat-bubble { border-radius: 18px; max-width: 85%; padding: 12px 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .ai-msg { background: #111; border: 1px solid #222; border-top-left-radius: 4px; }
        .user-msg { background: #e11d48; color: white; border-top-right-radius: 4px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .typing { display: flex; gap: 4px; padding: 10px; }
        .dot { width: 4px; height: 4px; background: #e11d48; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col h-screen max-w-lg mx-auto border-x border-[#111]">

    <header class="p-4 border-b border-[#222] flex items-center justify-between bg-[#050505]/80 backdrop-blur-md sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <a href="index.html" class="p-2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="m15 18-6-6 6-6"/></svg></a>
            <div>
                <h1 class="text-sm font-black italic uppercase tracking-tighter">Sushant <span class="text-rose-600">AI</span></h1>
                <p class="text-[8px] font-bold text-neutral-500 uppercase tracking-widest">Physio-Led Intelligence</p>
            </div>
        </div>
        <div id="status-dot" class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"></div>
    </header>

    <div id="chat" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar">
        <div class="flex justify-start">
            <div class="chat-bubble ai-msg">Namaste! Main Sushant ka AI Assistant hoon. Training, recovery ya nutrition se related kuch bhi puchiye. 💪</div>
        </div>
    </div>

    <div id="typing-indicator" class="hidden typing ml-4"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

    <footer class="p-4 bg-[#050505] border-t border-[#111]">
        <form id="form" class="flex gap-2">
            <input type="text" id="input" autocomplete="off" placeholder="Message Coach..." class="flex-1 bg-[#111] border border-[#222] rounded-xl px-4 py-3 text-sm text-white focus:border-rose-600 outline-none">
            <button type="submit" class="rose-gradient w-12 h-12 rounded-xl flex items-center justify-center active:scale-90 transition-transform">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </form>
    </footer>

    <script>
        const chat = document.getElementById('chat');
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const typing = document.getElementById('typing-indicator');
        const apiKey = ""; // Runtime provides this

        async function callGemini(userQuery) {
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: { 
                    parts: [{ text: "You are Coach Sushant's AI Assistant for FMS (Fitness Made Simplified). You are a Physiotherapist and Elite Strength Coach. Keep answers concise, science-based, and friendly. Use a mix of Hindi and English (Hinglish). If asked about booking, refer to Pro Plans on the home page." }] 
                }
            };

            let lastError = null;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || 'Network error');
                    }

                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (err) {
                    lastError = err;
                    const delay = Math.pow(2, i) * 1000;
                    await new Promise(r => setTimeout(r, delay));
                }
            }
            throw lastError;
        }

        function addMsg(role, text) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="chat-bubble ${role === 'user' ? 'user-msg' : 'ai-msg'}">${text}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const msg = input.value.trim();
            if (!msg) return;

            addMsg('user', msg);
            input.value = '';
            typing.classList.remove('hidden');

            try {
                const response = await callGemini(msg);
                typing.classList.add('hidden');
                addMsg('ai', response);
            } catch (err) {
                typing.classList.add('hidden');
                addMsg('ai', `System update ho raha hai (Error: ${err.message}). Please thodi der baad try karein ya WhatsApp par connect karein.`);
                console.error("Gemini Error:", err);
            }
        };
    </script>
</body>
</html>
