<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FMS AI COACH | Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', system-ui, sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        .rose-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .chat-bubble { border-radius: 20px; max-width: 85%; padding: 14px 18px; font-size: 15px; line-height: 1.6; box-shadow: 0 4px 15px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.08); }
        .ai-msg { background: #121212; border-top-left-radius: 4px; color: #f3f3f3; }
        .user-msg { background: #e11d48; color: white; border-top-right-radius: 4px; align-self: flex-end; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .typing { display: flex; gap: 5px; padding: 12px 0; }
        .dot { width: 7px; height: 7px; background: #e11d48; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.4); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        footer { padding: 16px; background: #0a0a0a; border-top: 1px solid #1a1a1a; padding-bottom: max(16px, env(safe-area-inset-bottom)); }
        .paywall { background: rgba(15,15,15,0.98); backdrop-filter: blur(20px); padding: 28px; border-radius: 28px; border: 1px solid #333; text-align: center; box-shadow: 0 -10px 40px rgba(0,0,0,0.8); }
    </style>
</head>
<body class="max-w-lg mx-auto border-x border-[#111]">

    <header class="p-4 border-b border-[#222] flex items-center justify-between bg-[#050505] shrink-0 z-50">
        <div class="flex items-center gap-3">
            <a href="index.html" class="p-1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></a>
            <div>
                <h1 class="text-sm font-black italic uppercase tracking-tighter">Sushant <span class="text-rose-600">AI</span></h1>
                <p id="counter-badge" class="text-[9px] font-bold text-neutral-500 uppercase tracking-widest bg-[#111] px-2 py-0.5 rounded border border-[#222]">READY</p>
            </div>
        </div>
        <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_12px_#10b981]"></div>
    </header>

    <div id="chat-container" class="no-scrollbar">
        <!-- Initial Message -->
        <div class="chat-bubble ai-msg">Yo! I'm your FMS AI Coach. Ready to crush some goals? Whether it's fixing that nagging back pain, smashing a chest day, or dialling in your fat loss—I've got you. What's on your mind today? 🔥</div>
    </div>

    <div id="typing-area" class="hidden px-8"><div class="typing"><div class="dot" style="animation-delay:-0.32s"></div><div class="dot" style="animation-delay:-0.16s"></div><div class="dot"></div></div></div>

    <footer id="footer-logic">
        <form id="chat-form" class="flex gap-3">
            <input type="text" id="user-input" autocomplete="off" placeholder="Ask about workouts or rehab..." class="flex-1 bg-[#141414] border border-[#222] rounded-2xl px-5 py-4 text-sm text-white focus:border-rose-600 outline-none transition-all placeholder:text-neutral-600">
            <button type="submit" class="rose-gradient w-14 h-14 rounded-2xl flex items-center justify-center active:scale-90 transition-transform shrink-0 shadow-xl shadow-rose-900/10">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </form>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const inputField = document.getElementById('user-input');
        const typingArea = document.getElementById('typing-area');
        const badge = document.getElementById('counter-badge');
        const footer = document.getElementById('footer-logic');

        // CORE SETTINGS
        const API_KEY = "AIzaSyDPT1BvhDvYgIYDW6MNJ-a7Hka3L35MeQE"; // Your Gemini Key
        const MAX_FREE = 15;
        let usedCount = localStorage.getItem('fms_global_v5') ? parseInt(localStorage.getItem('fms_global_v5')) : 0;

        function refreshUI() {
            const left = MAX_FREE - usedCount;
            badge.textContent = `${left > 0 ? left : 0} FREE CREDITS LEFT`;
            if (usedCount >= MAX_FREE) {
                footer.innerHTML = `
                    <div class="paywall mx-2 mb-2">
                        <h3 class="text-sm font-black uppercase text-rose-500 mb-2">Daily Session Limit Reached</h3>
                        <p class="text-xs text-neutral-400 mb-6 px-4">You've hit the limit for free daily tips. Upgrade to keep the progress going or contact the Coach directly.</p>
                        <div class="flex flex-col gap-3">
                            <a href="upi://pay?pa=9899550279@ptsbi&pn=Sushant%20Sehgal&am=100&cu=INR" class="rose-gradient py-4 rounded-2xl text-[11px] font-black uppercase tracking-widest shadow-lg text-center">Unlock Full Access (₹100)</a>
                            <a href="https://wa.me/919899550279" class="bg-[#1a1a1a] border border-[#333] py-4 rounded-2xl text-[11px] font-black uppercase text-center text-white">DM Coach on WhatsApp</a>
                        </div>
                    </div>`;
            }
        }

        async function talkToGemini(msg) {
            // Using the Flash model which is faster and less prone to "hit" errors
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AIzaSyDow7jtL0NtsZw_0ALVztRxhzXi9BZVWZI}`;
            
            const systemPrompt = "You are Coach Sushant Sehgal (FMS Brand). You are speaking to international clients (US, UK, Germany). Tone: Casual, high-energy, 'Bro-Coach' style, highly professional. Language: English. Expert in Biomechanics, Hypertrophy, HIIT, and Pain Rehab. Keep responses punchy, use emojis, and give tactical cues (tempo, form). If a query is too medical, suggest contacting you on WhatsApp.";

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Instruction: ${systemPrompt}\nUser says: ${msg}` }] }],
                        generationConfig: { temperature: 0.85, maxOutputTokens: 500 }
                    })
                });

                if (!response.ok) throw new Error("API_FAIL");
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                console.error(e);
                return "My bad, brother! The server is under heavy load right now. Try hitting me up in a minute or DM me on WhatsApp if it's urgent! ⚡";
            }
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `chat-bubble ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const val = inputField.value.trim();
            if (!val || usedCount >= MAX_FREE) return;

            addMessage('user', val);
            inputField.value = '';
            usedCount++;
            localStorage.setItem('fms_global_v5', usedCount);
            refreshUI();

            typingArea.classList.remove('hidden');
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });

            const reply = await talkToGemini(val);
            typingArea.classList.add('hidden');
            addMessage('ai', reply);
        };

        refreshUI();

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + 'px';
                chatBox.scrollTo({ top: chatBox.scrollHeight });
            });
        }
    </script>
</body>
</html>
