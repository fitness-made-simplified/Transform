<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FMS | Physio-Led Fitness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .rose-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-press:active { transform: scale(0.96); }
        ::-webkit-scrollbar { display: none; }
        .nav-active { color: #e11d48; opacity: 1 !important; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; outline: none; transition: 0.3s; width: 100%; }
        input:focus { border-color: #e11d48; background: rgba(255,255,255,0.08); }
        .pb-glow { background: rgba(225, 29, 72, 0.1); border-left: 3px solid #e11d48 !important; }
    </style>
</head>
<body class="pb-32">

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[95%] max-w-lg z-50">
        <div class="glass flex justify-around items-center py-4 px-2 shadow-2xl border-white/10">
            <button onclick="showTab('home')" class="nav-btn flex flex-col items-center gap-1 opacity-50" id="nav-home">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span class="text-[8px] font-black uppercase tracking-widest">Coach</span>
            </button>
            <button onclick="showTab('portal')" class="nav-btn flex flex-col items-center gap-1 opacity-50" id="nav-portal">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="text-[8px] font-black uppercase tracking-widest">Portal</span>
            </button>
            <button onclick="showTab('transform')" class="nav-btn flex flex-col items-center gap-1 opacity-50" id="nav-transform">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h.01"/><path d="M7 16h10"/><path d="M9 12h6"/></svg>
                <span class="text-[8px] font-black uppercase tracking-widest">Track</span>
            </button>
            <button onclick="showTab('kitchen')" class="nav-btn flex flex-col items-center gap-1 opacity-50" id="nav-kitchen">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/></svg>
                <span class="text-[8px] font-black uppercase tracking-widest">Diet</span>
            </button>
        </div>
    </nav>

    <main class="p-6 pt-12">
        <section id="home" class="tab-content active max-w-xl mx-auto">
            <div class="mb-10 flex items-center gap-3">
                <div class="rose-gradient w-10 h-10 rounded-xl flex items-center justify-center font-black italic text-white">FS</div>
                <h1 class="text-2xl font-black italic uppercase tracking-tighter text-white">Simplified</h1>
            </div>
            <div class="relative rounded-[2.5rem] overflow-hidden h-[450px] mb-8 group">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiNoyff9-BHFiEp1CHfRicOK8IG6guQaTYXR10D-dvAaMB3Nkdp4YqJ2YjNaf3dJOxysSg1Pkse-qj2DzRmqfKtev5O7empJPe64qJ50I_ljE63IJGDMNE8bTQFeRAjg1RP1GihU3QpU_8NlgbCAnwqaug7FrNjg6N11__eehlUXpbKCyxWmLNrJkStI1Q/s1536/1000386771.png" class="w-full h-full object-cover grayscale opacity-80">
                <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                <div class="absolute bottom-8 left-8 text-white">
                    <p class="text-[10px] font-black text-rose-500 uppercase tracking-[0.2em] mb-2">Physiotherapist & Master Coach</p>
                    <h3 class="text-5xl font-black uppercase italic leading-none mb-2">Sushant</h3>
                    <p class="text-xs font-medium italic opacity-60">BPT • NDDY • ACE CPT • MBA</p>
                </div>
            </div>
            <button onclick="showTab('portal')" class="w-full rose-gradient py-5 rounded-2xl font-black uppercase italic tracking-tighter text-white shadow-2xl btn-press">View My Progress</button>
        </section>

        <section id="portal" class="tab-content max-w-xl mx-auto">
            <div id="login-view">
                <h2 class="text-3xl font-black italic uppercase mb-2 text-white">Client <span class="text-rose-600">Portal</span></h2>
                <div class="flex gap-2 mb-4 mt-8">
                    <input type="text" id="clientIdInput" placeholder="Enter ID (e.g. Fms1325)">
                    <button onclick="fetchClientData()" id="loginBtn" class="rose-gradient px-8 rounded-xl font-black uppercase text-xs text-white">GO</button>
                </div>
            </div>

            <div id="profile-view" class="hidden text-white">
                <div class="flex justify-between items-end mb-8">
                    <h1 id="clientName" class="text-4xl font-black uppercase italic tracking-tighter">--</h1>
                    <button onclick="window.location.reload()" class="text-[8px] font-black uppercase text-neutral-500 mb-2">Logout</button>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-10">
                    <div class="glass p-5 text-center"><p class="text-[9px] uppercase text-neutral-500 mb-1">Weight</p><p class="text-2xl font-black italic"><span id="p-weight">--</span>kg</p></div>
                    <div class="glass p-5 text-center border-b-2 border-rose-500"><p class="text-[9px] uppercase text-rose-500 mb-1">BMI Score</p><p id="p-bmi" class="text-2xl font-black italic text-rose-500">--</p></div>
                </div>
                <h3 class="text-[10px] font-black uppercase text-rose-500 mb-4 tracking-widest italic">Workout History (Last 25)</h3>
                <div class="glass overflow-hidden max-h-[500px] overflow-y-auto">
                    <table class="w-full text-left text-sm"><tbody id="p-journal" class="font-bold italic text-neutral-300"></tbody></table>
                </div>
            </div>
        </section>

        <section id="transform" class="tab-content max-w-xl mx-auto">
            <h2 class="text-3xl font-black italic uppercase mb-2 text-white">Activity <span class="text-rose-600">Track</span></h2>
            <div class="glass p-6 rounded-[2rem] mt-8">
                <h3 class="text-xs font-black uppercase text-rose-500 mb-4 tracking-widest">Log Today's Entry</h3>
                <div class="flex flex-col gap-3">
                    <input type="text" id="ex-name" placeholder="Exercise Name">
                    <div class="grid grid-cols-3 gap-3">
                        <input type="number" id="ex-sets" placeholder="Sets">
                        <input type="number" id="ex-reps" placeholder="Reps">
                        <input type="text" id="ex-weight" placeholder="Kg/Lvl">
                    </div>
                    <button id="addBtn" onclick="logWorkout()" class="rose-gradient py-4 rounded-xl font-black uppercase text-xs text-white btn-press">Add to History</button>
                </div>
                <div id="share-section" class="hidden mt-6 pt-6 border-t border-white/10">
                    <p class="text-[10px] text-center font-black uppercase text-neutral-500 mb-3">Update your coach</p>
                    <button id="whatsappBtn" class="w-full bg-[#25D366] py-4 rounded-xl font-black uppercase text-xs text-white flex items-center justify-center gap-2">
                        Share on WhatsApp
                    </button>
                </div>
            </div>
        </section>

        <section id="kitchen" class="tab-content max-w-xl mx-auto text-white text-center p-12">
            <h2 class="text-3xl font-black italic uppercase mb-4">The Kitchen</h2>
            <p class="text-neutral-500 text-xs italic">Personalized diet plans appearing soon...</p>
        </section>
    </main>

    <script>
        const SHEETDB_URL = "https://sheetdb.io/api/v1/q4n4z3yr8dbyt";
        let activeClientId = "";
        let clientName = "";
        let lastEntry = null;
        let isNewPB = false;

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('nav-active'));
            if(document.getElementById(tabId)) document.getElementById(tabId).classList.add('active');
            if(document.getElementById('nav-' + tabId)) document.getElementById('nav-' + tabId).classList.add('nav-active');
            window.scrollTo(0,0);
        }

        async function fetchClientData() {
            const id = document.getElementById('clientIdInput').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            if (!id) return;
            loginBtn.innerText = "...";
            try {
                const profileRes = await fetch(`${SHEETDB_URL}/search?id=${id}`);
                const profileData = await profileRes.json();
                if (profileData && profileData.length > 0) {
                    const client = profileData[0];
                    activeClientId = client.id;
                    clientName = client.name;
                    document.getElementById('clientName').innerText = clientName;
                    document.getElementById('p-weight').innerText = client.weight;
                    const h = parseFloat(client.height), w = parseFloat(client.weight);
                    if (h > 0 && w > 0) document.getElementById('p-bmi').innerText = (w / ((h/100)**2)).toFixed(1);

                    const historyRes = await fetch(`${SHEETDB_URL}/search?id=${id}&sheet=Workouts`);
                    const historyData = await historyRes.json();
                    const journal = document.getElementById('p-journal');
                    journal.innerHTML = "";
                    
                    if (Array.isArray(historyData)) {
                        const history = [...historyData].reverse();
                        const pbs = {};
                        [...historyData].forEach(log => {
                            const w = parseFloat(log.weight) || 0;
                            if(!pbs[log.exercise] || w > pbs[log.exercise]) pbs[log.exercise] = w;
                        });

                        history.slice(0, 25).forEach(log => {
                            const curW = parseFloat(log.weight) || 0;
                            const isPB = curW > 0 && curW === pbs[log.exercise];
                            journal.innerHTML += `
                                <tr class="border-t border-white/5 ${isPB ? 'pb-glow' : ''}">
                                    <td class="p-4 uppercase text-[10px] text-white">
                                        ${log.exercise} ${isPB ? '<span class="text-rose-500 font-black ml-1 text-[8px]">NEW PB 🔥</span>' : ''}
                                        <br><span class="text-neutral-600 text-[8px]">${log.date}</span>
                                    </td>
                                    <td class="p-4 text-right font-black italic text-xs">
                                        <span class="text-rose-500">${log.sets}x${log.reps}</span>
                                        <br><span class="text-white opacity-60">${log.weight || '-'}kg</span>
                                    </td>
                                </tr>`;
                        });
                    }
                    document.getElementById('login-view').classList.add('hidden');
                    document.getElementById('profile-view').classList.remove('hidden');
                } else { loginBtn.innerText = "!"; }
            } catch (e) { loginBtn.innerText = "ERR"; }
        }

        async function logWorkout() {
            if (!activeClientId) { showTab('portal'); return; }
            const name = document.getElementById('ex-name').value.trim();
            const sets = document.getElementById('ex-sets').value;
            const reps = document.getElementById('ex-reps').value;
            const weight = document.getElementById('ex-weight').value;
            const btn = document.getElementById('addBtn');
            if(!name || !sets || !reps) return;
            btn.innerText = "SAVING...";

            try {
                // Check if this is a PB before saving
                const historyRes = await fetch(`${SHEETDB_URL}/search?id=${activeClientId}&exercise=${name}&sheet=Workouts`);
                const historyData = await historyRes.json();
                let currentMax = 0;
                if (Array.isArray(historyData)) {
                    historyData.forEach(l => { if(parseFloat(l.weight) > currentMax) currentMax = parseFloat(l.weight); });
                }
                isNewPB = parseFloat(weight) > currentMax;

                const res = await fetch(`${SHEETDB_URL}?sheet=Workouts`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ data: [{ id: activeClientId, date: new Date().toLocaleDateString('en-GB'), exercise: name, sets: sets, reps: reps, weight: weight }] })
                });
                
                if(res.ok) {
                    btn.innerText = "SAVED!";
                    lastEntry = { name, sets, reps, weight };
                    document.getElementById('share-section').classList.remove('hidden');
                    document.getElementById('whatsappBtn').onclick = shareOnWhatsApp;
                    setTimeout(() => btn.innerText = "Add to History", 2000);
                    fetchClientData();
                }
            } catch (e) { btn.innerText = "ERR"; }
        }

        function shareOnWhatsApp() {
            const pbText = isNewPB ? " *[NEW PERSONAL BEST! 🔥]*" : "";
            const message = `💪 *Workout Update: ${clientName}*\n\n✅ *Exercise:* ${lastEntry.name}${pbText}\n🔢 *Volume:* ${lastEntry.sets} sets x ${lastEntry.reps} reps\n⚖️ *Weight:* ${lastEntry.weight}kg\n\n_Logged via FMS Simplified Portal_`;
            window.open(`https://wa.me/919899550279?text=${encodeURIComponent(message)}`, '_blank');
        }

        window.onload = () => showTab('home');
    </script>
</body>
</html>
