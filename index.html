<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FMS | Physio-Led Fitness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .rose-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-press:active { transform: scale(0.96); }
        ::-webkit-scrollbar { display: none; }
        .nav-active { color: #e11d48; opacity: 1 !important; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; outline: none; transition: 0.3s; width: 100%; }
        input:focus { border-color: #e11d48; background: rgba(255,255,255,0.08); }
    </style>
</head>
<body class="pb-32">

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[95%] max-w-lg z-50">
        <div class="glass flex justify-around items-center py-4 px-2 shadow-2xl border-white/10">
            <button onclick="showTab('home')" class="nav-btn flex flex-col items-center gap-1 opacity-50" id="nav-home">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span class="text-[8px] font-black uppercase tracking-widest">Coach</span>
            </button>
            <button onclick="showTab('portal')" class="nav-btn flex flex-col items-center gap-1 opacity-50" id="nav-portal">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="text-[8px] font-black uppercase tracking-widest">Portal</span>
            </button>
            <button onclick="showTab('transform')" class="nav-btn flex flex-col items-center gap-1 opacity-50" id="nav-transform">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h.01"/><path d="M7 16h10"/><path d="M9 12h6"/></svg>
                <span class="text-[8px] font-black uppercase tracking-widest">Track</span>
            </button>
        </div>
    </nav>

    <main class="p-6 pt-12">
        
        <section id="home" class="tab-content active max-w-xl mx-auto">
            <div class="flex items-center gap-3 mb-10">
                <div class="rose-gradient w-10 h-10 rounded-xl flex items-center justify-center font-black italic text-white">FS</div>
                <h1 class="text-2xl font-black italic uppercase text-white">Simplified</h1>
            </div>
            <div class="glass p-8 text-center border-rose-500/20 mb-6">
                <h3 class="text-3xl font-black uppercase italic mb-2">Physio-Led <br><span class="text-rose-600">Fitness</span></h3>
                <p class="text-xs text-neutral-400 font-medium">Science based results by Sushant Sehgal</p>
            </div>
        </section>

        <section id="portal" class="tab-content max-w-xl mx-auto">
            <div id="login-view">
                <h2 class="text-3xl font-black italic uppercase mb-2">Client <span class="text-rose-600">Portal</span></h2>
                <p class="text-neutral-500 text-[10px] font-bold uppercase mb-8">Enter ID to view progress</p>
                <input type="text" id="clientIdInput" placeholder="Enter Client ID (e.g., Fms1325)" class="mb-4">
                <button onclick="fetchClientData()" id="loginBtn" class="rose-gradient w-full py-4 rounded-xl font-black uppercase text-xs text-white">View Transformation</button>
            </div>

            <div id="profile-view" class="hidden">
                <div class="flex justify-between items-end mb-8">
                    <h1 id="clientName" class="text-4xl font-black uppercase italic tracking-tighter">--</h1>
                    <button onclick="window.location.reload()" class="text-[8px] font-black uppercase text-neutral-500 mb-2">Logout</button>
                </div>
                
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="glass p-5 text-center">
                        <p class="text-[9px] uppercase text-neutral-500 mb-1">Weight</p>
                        <p class="text-2xl font-black italic"><span id="p-weight">--</span>kg</p>
                    </div>
                    <div class="glass p-5 text-center border-b-2 border-rose-500">
                        <p class="text-[9px] uppercase text-rose-500 mb-1">Status</p>
                        <p class="text-xl font-black italic text-rose-500">Active</p>
                    </div>
                </div>

                <div class="mb-10">
                    <h3 class="text-[10px] font-black uppercase text-blue-500 mb-4 tracking-widest italic">Weekly Schedule</h3>
                    <div class="glass p-6 bg-blue-500/5 border-t border-blue-500/20">
                        <p id="p-schedule" class="text-sm italic leading-relaxed text-neutral-300">No plan assigned</p>
                    </div>
                </div>

                <h3 class="text-[10px] font-black uppercase text-rose-500 mb-4 tracking-widest italic">Workout History</h3>
                <div class="glass overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <tbody id="p-journal" class="font-bold italic text-neutral-300"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="transform" class="tab-content max-w-xl mx-auto">
            <h2 class="text-3xl font-black italic uppercase mb-2">Activity <span class="text-rose-600">Track</span></h2>
            <p class="text-neutral-500 text-[10px] font-bold uppercase tracking-widest mb-8">Daily Progress Journal</p>

            <div class="glass p-6 rounded-[2rem] mb-6">
                <h3 class="text-xs font-black uppercase text-rose-500 mb-4 tracking-widest">Log Today's Entry</h3>
                <div class="flex flex-col gap-3">
                    <input type="text" id="ex-name" placeholder="Exercise Name">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="ex-sets" placeholder="Sets">
                        <input type="number" id="ex-reps" placeholder="Reps">
                    </div>
                    <button id="addBtn" onclick="logWorkout()" class="rose-gradient py-4 rounded-xl font-black uppercase text-xs text-white">Add to History</button>
                </div>
            </div>
        </section>

    </main>

    <script>
        const SHEETDB_URL = "https://sheetdb.io/api/v1/q4n4z3yr8dbyt";
        let activeClientId = "";

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('nav-active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('nav-active');
        }

        async function fetchClientData() {
            const id = document.getElementById('clientIdInput').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            if (!id) return;
            loginBtn.innerText = "VERIFYING...";
            
            try {
                const profileRes = await fetch(`${SHEETDB_URL}/search?id=${id}`);
                const profileData = await profileRes.json();

                if (profileData && profileData.length > 0) {
                    const client = profileData[0];
                    activeClientId = client.id;
                    document.getElementById('clientName').innerText = client.name;
                    document.getElementById('p-weight').innerText = client.weight;
                    document.getElementById('p-schedule').innerHTML = (client.schedule || "Rest Day").replaceAll('\n', '<br>');

                    const historyRes = await fetch(`${SHEETDB_URL}/search?id=${id}&sheet=Workouts`);
                    const historyData = await historyRes.json();
                    const journal = document.getElementById('p-journal');
                    journal.innerHTML = "";

                    if (historyData.length > 0) {
                        historyData.reverse().slice(0, 5).forEach(log => {
                            journal.innerHTML += `<tr class="border-t border-white/5"><td class="p-4 uppercase text-[10px]">${log.exercise}<br><span class="text-neutral-600 text-[8px]">${log.date}</span></td><td class="p-4 text-rose-500 text-right font-black italic">${log.sets}x${log.reps}</td></tr>`;
                        });
                    }
                    document.getElementById('login-view').classList.add('hidden');
                    document.getElementById('profile-view').classList.remove('hidden');
                } else { loginBtn.innerText = "ID NOT FOUND"; }
            } catch (e) { loginBtn.innerText = "ERROR"; }
        }

        async function logWorkout() {
            if (!activeClientId) { alert("Please login in Portal first!"); return; }
            const name = document.getElementById('ex-name').value;
            const sets = document.getElementById('ex-sets').value;
            const reps = document.getElementById('ex-reps').value;
            const btn = document.getElementById('addBtn');

            if(!name || !sets || !reps) return;
            btn.innerText = "SAVING...";

            const data = { 
                id: activeClientId, 
                date: new Date().toLocaleDateString('en-GB'), 
                exercise: name, 
                sets: sets, 
                reps: reps 
            };

            try {
                const res = await fetch(`${SHEETDB_URL}?sheet=Workouts`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ data: [data] })
                });
                if(res.ok) {
                    alert("Workout Logged!");
                    btn.innerText = "ADD TO HISTORY";
                    document.getElementById('ex-name').value = '';
                    fetchClientData(); // Refresh list
                }
            } catch (e) { btn.innerText = "ERROR"; }
        }
    </script>
</body>
</html>
