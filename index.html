<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FMS | Physio-Led Fitness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .rose-gradient { background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white; outline: none; width: 100%; }
        .btn-press:active { transform: scale(0.96); }
    </style>
</head>
<body class="pb-32">
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[95%] max-w-lg z-50">
        <div class="glass flex justify-around items-center py-4 px-2 shadow-2xl">
            <button onclick="showTab('home')" class="flex flex-col items-center gap-1"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span class="text-[8px] font-black uppercase">Coach</span></button>
            <button onclick="showTab('portal')" class="flex flex-col items-center gap-1"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="text-[8px] font-black uppercase">Portal</span></button>
        </div>
    </nav>

    <main class="p-6 pt-12">
        <section id="home" class="tab-content active max-w-xl mx-auto">
            <div class="mb-10 flex items-center gap-3">
                <div class="rose-gradient w-10 h-10 rounded-xl flex items-center justify-center font-black italic">FS</div>
                <h1 class="text-2xl font-black italic uppercase tracking-tighter">Simplified</h1>
            </div>
            <div class="relative rounded-[2.5rem] overflow-hidden h-[400px] mb-8">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiNoyff9-BHFiEp1CHfRicOK8IG6guQaTYXR10D-dvAaMB3Nkdp4YqJ2YjNaf3dJOxysSg1Pkse-qj2DzRmqfKtev5O7empJPe64qJ50I_ljE63IJGDMNE8bTQFeRAjg1RP1GihU3QpU_8NlgbCAnwqaug7FrNjg6N11__eehlUXpbKCyxWmLNrJkStI1Q/s1536/1000386771.png" class="w-full h-full object-cover grayscale opacity-80">
                <div class="absolute bottom-8 left-8">
                    <h3 class="text-5xl font-black uppercase italic leading-none">Sushant</h3>
                </div>
            </div>
            <button onclick="showTab('portal')" class="w-full rose-gradient py-5 rounded-2xl font-black uppercase italic tracking-tighter text-white btn-press">Enter Client Portal</button>
        </section>

        <section id="portal" class="tab-content max-w-xl mx-auto pt-10">
            <h2 class="text-3xl font-black italic uppercase mb-8">Client <span class="text-rose-600">Portal</span></h2>
            <div class="flex gap-2">
                <input type="text" id="clientIdInput" placeholder="Enter ID (e.g. Fms1325)">
                <button onclick="login()" id="loginBtn" class="rose-gradient px-8 rounded-xl font-black uppercase text-xs text-white">GO</button>
            </div>
        </section>
    </main>

    <script>
        function showTab(t){
            document.querySelectorAll('.tab-content').forEach(s=>s.classList.remove('active'));
            document.getElementById(t).classList.add('active');
        }
        function login(){
            const id = document.getElementById('clientIdInput').value.trim();
            if(id) window.location.href = `profile.html?id=${id}`;
        }
    </script>
</body>
</html>
