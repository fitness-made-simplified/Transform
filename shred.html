<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMS | 30 Day Shred</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; padding: 24px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .day-card { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-weight: 900; font-style: italic; border: 1px solid rgba(225, 29, 72, 0.2); border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .day-card:active { transform: scale(0.9); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; padding: 24px; align-items: center; justify-content: center; }
        .exercise-list::-webkit-scrollbar { width: 4px; }
        .exercise-list::-webkit-scrollbar-thumb { background: rgba(225, 29, 72, 0.5); border-radius: 10px; }
    </style>
</head>
<body class="pb-20">
    <header class="mb-10">
        <a href="index.html" class="text-rose-500 font-black uppercase text-[10px] tracking-widest mb-4 block">← Back</a>
        <h1 class="text-4xl font-black uppercase italic leading-none mb-2">30 DAY <span class="text-rose-600">SHRED</span></h1>
        <p class="text-[10px] font-black uppercase text-neutral-500 italic tracking-[0.2em]">"Your transformation is earned, not given."</p>
    </header>

    <div class="grid grid-cols-5 gap-3 mb-12" id="daysGrid">
        <script>
            for(let i=1; i<=30; i++) {
                document.write(`<div onclick="openDay(${i})" class="glass day-card">${i}</div>`);
            }
        </script>
    </div>

    <div class="glass p-8 text-center border-t-2 border-rose-600">
        <h3 class="font-black italic text-xl uppercase mb-2">Physio-Led Custom Protocol</h3>
        <a href="https://wa.me/919899550279?text=I'm ready for a Personalized Shred Plan" class="inline-block bg-white text-black px-8 py-4 rounded-xl font-black uppercase text-xs tracking-widest">Book 1-on-1 PT</a>
    </div>

    <div id="dayModal" class="modal" onclick="this.style.display='none'">
        <div class="glass p-6 w-full max-w-sm max-h-[85vh] flex flex-col" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-3xl font-black italic uppercase text-rose-500 mb-4 text-center"></h2>
            <div id="modalContent" class="exercise-list overflow-y-auto pr-2 space-y-6"></div>
            <button onclick="document.getElementById('dayModal').style.display='none'" class="mt-6 w-full py-4 bg-white/5 border border-white/10 rounded-xl font-black uppercase text-[10px] tracking-widest">Continue Shred</button>
        </div>
    </div>

    <script>
        const lib = "https://cdn.jsdelivr.net/gh/yuhonas/free-exercise-db/exercises/";
        const exerciseLibrary = {
            "Jumping Jacks": lib + "Jumping_Jacks/1.gif",
            "High Knees": lib + "High_Knees/1.gif",
            "Spot Jog": lib + "Jogging_In_Place/1.gif",
            "Inchworm": lib + "Inchworms/1.gif",
            "Squats": lib + "Air_Squats/1.gif",
            "Push Ups": lib + "Push_Ups/1.gif",
            "Tricep Dips": lib + "Tricep_Dips_On_Floor/1.gif",
            "Sumo Squats": lib + "Sumo_Squats/1.gif",
            "Side Kicks Standing": lib + "Side_Leg_Raises/1.gif",
            "Lunges": lib + "Lunges/1.gif",
            "Lunge Kicks": lib + "Lunge_Front_Kicks/1.gif",
            "Jump Squats": lib + "Jump_Squats/1.gif",
            "Burpees": lib + "Burpees/1.gif",
            "Mountain Climbers": lib + "Mountain_Climbers/1.gif",
            "Plank Jacks": lib + "Plank_Jacks/1.gif",
            "Duck Walk": lib + "Duck_Walks/1.gif",
            "Crunches": lib + "Crunches/1.gif",
            "Rockers": lib + "Hollow_Body_Rocks/1.gif",
            "Sit Ups": lib + "Sit_Ups/1.gif",
            "Leg Raises": lib + "Leg_Raises/1.gif"
        };

        const exerciseNames = Object.keys(exerciseLibrary);

        function openDay(day) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = "DAY " + day;

            if (day % 4 === 0) {
                modalContent.innerHTML = `<div class="text-center py-10"><i class="fas fa-couch text-rose-600 text-5xl mb-4"></i><p class="text-lg italic font-bold">Rest & Recovery</p></div>`;
            } else {
                const block = Math.floor((day - 1) / 4); 
                const baseReps = 12 + (block * 2); 
                const baseSets = 3 + Math.floor(block / 2); 
                const startIdx = (day % exerciseNames.length);
                const routine = [exerciseNames[startIdx], exerciseNames[(startIdx+1)%exerciseNames.length], exerciseNames[(startIdx+2)%exerciseNames.length]];

                let html = "<div class='space-y-6'>";
                routine.forEach(ex => {
                    html += `<div><img src="${exerciseLibrary[ex]}" class="w-full h-40 object-cover rounded-xl border border-white/10 mb-2 shadow-lg"><div class="flex justify-between items-center px-1"><span class="font-black uppercase italic text-[11px] tracking-widest">${ex}</span><span class="text-rose-500 font-black italic text-[12px]">${baseSets}x${baseReps}</span></div></div>`;
                });
                modalContent.innerHTML = html + "</div>";
            }
            document.getElementById('dayModal').style.display = 'flex';
        }
    </script>
</body>
</html>
