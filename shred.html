<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMS | 30 Day Shred</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; padding: 24px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .day-card { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-weight: 900; font-style: italic; border: 1px solid rgba(225, 29, 72, 0.2); border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .day-card:active { transform: scale(0.9); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; padding: 24px; align-items: center; justify-content: center; }
        .exercise-list::-webkit-scrollbar { width: 4px; }
        .exercise-list::-webkit-scrollbar-thumb { background: rgba(225, 29, 72, 0.5); border-radius: 10px; }
    </style>
</head>
<body class="pb-20">
    <header class="mb-10">
        <a href="index.html" class="text-rose-500 font-black uppercase text-[10px] tracking-widest mb-4 block">← Back</a>
        <h1 class="text-4xl font-black uppercase italic leading-none mb-2">30 DAY <span class="text-rose-600">SHRED</span></h1>
    </header>

    <div class="grid grid-cols-5 gap-3 mb-12" id="daysGrid">
        <script>
            for(let i=1; i<=30; i++) {
                document.write(`<div onclick="openDay(${i})" class="glass day-card">${i}</div>`);
            }
        </script>
    </div>

    <div id="dayModal" class="modal" onclick="this.style.display='none'">
        <div class="glass p-6 w-full max-w-sm max-h-[85vh] flex flex-col border border-rose-600/20" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-3xl font-black italic uppercase text-rose-500 mb-6 text-center underline decoration-rose-600/30"></h2>
            <div id="modalContent" class="exercise-list overflow-y-auto pr-2 space-y-8"></div>
            <button onclick="document.getElementById('dayModal').style.display='none'" class="mt-6 w-full py-4 bg-white/5 border border-white/10 rounded-xl font-black uppercase text-[10px]">Close Workout</button>
        </div>
    </div>

    <script>
        // Manually mapped reliable images for each shred exercise
        const exerciseLibrary = {
            "Jumping Jacks": "https://www.spotebi.com/wp-content/uploads/2014/10/jumping-jacks-exercise-illustration.jpg",
            "High Knees": "https://www.spotebi.com/wp-content/uploads/2014/10/high-knees-exercise-illustration.jpg",
            "Spot Jog": "https://media.istockphoto.com/id/1210831610/vector/man-running-on-the-spot-jogging-icon.jpg?s=612x612&w=0&k=20&c=u-8D1m_vL4uW60XGfI4L_V3RkE_D8GfXp5V9-Y-R26M=",
            "Inchworm": "https://www.spotebi.com/wp-content/uploads/2015/01/inchworm-exercise-illustration.jpg",
            "Squats": "https://www.spotebi.com/wp-content/uploads/2014/10/bodyweight-squats-exercise-illustration.jpg",
            "Push Ups": "https://www.spotebi.com/wp-content/uploads/2014/10/push-ups-exercise-illustration.jpg",
            "Tricep Dips": "https://www.spotebi.com/wp-content/uploads/2014/10/tricep-dips-exercise-illustration.jpg",
            "Sumo Squats": "https://www.spotebi.com/wp-content/uploads/2015/01/sumo-squat-exercise-illustration.jpg",
            "Lunges": "https://www.spotebi.com/wp-content/uploads/2014/10/lunges-exercise-illustration.jpg",
            "Burpees": "https://www.spotebi.com/wp-content/uploads/2014/10/burpees-exercise-illustration.jpg",
            "Mountain Climbers": "https://www.spotebi.com/wp-content/uploads/2014/10/mountain-climbers-exercise-illustration.jpg",
            "Crunches": "https://www.spotebi.com/wp-content/uploads/2014/10/abdominal-crunches-exercise-illustration.jpg",
            "Leg Raises": "https://www.spotebi.com/wp-content/uploads/2014/10/leg-raises-exercise-illustration.jpg",
            "Plank Jacks": "https://www.spotebi.com/wp-content/uploads/2015/03/plank-jacks-exercise-illustration.jpg"
        };

        const names = Object.keys(exerciseLibrary);

        function openDay(day) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = "DAY " + day;

            if (day % 4 === 0) {
                modalContent.innerHTML = `<div class="text-center py-10"><i class="fas fa-couch text-rose-600 text-5xl mb-4"></i><p class="text-lg italic font-black">RECOVERY</p></div>`;
            } else {
                const reps = 12 + (Math.floor(day/4) * 2);
                let html = "";
                
                // Logic to pick 3 exercises based on the day
                for(let i=0; i<3; i++) {
                    const ex = names[(day + i) % names.length];
                    const img = exerciseLibrary[ex];
                    html += `
                    <div class="space-y-3">
                        <div class="h-44 w-full rounded-xl overflow-hidden border border-white/10 bg-white p-2">
                            <img src="${img}" class="w-full h-full object-contain" loading="eager">
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="font-black uppercase italic text-sm tracking-widest text-white">${ex}</span>
                            <span class="text-rose-500 font-black italic text-lg">3x${reps}</span>
                        </div>
                    </div>`;
                }
                modalContent.innerHTML = html;
            }
            document.getElementById('dayModal').style.display = 'flex';
        }
    </script>
</body>
</html>
