<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMS | 30 Day Shred</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- We use Font Awesome for the icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; padding: 24px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .day-card { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-weight: 900; font-style: italic; border: 1px solid rgba(225, 29, 72, 0.2); border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .day-card:active { transform: scale(0.9); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; padding: 24px; align-items: center; justify-content: center; }
        .exercise-card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; border-left: 4px solid #e11d48; }
    </style>
</head>
<body class="pb-20">
    <header class="mb-10">
        <a href="index.html" class="text-rose-500 font-black uppercase text-[10px] tracking-widest mb-4 block">← Back</a>
        <h1 class="text-4xl font-black uppercase italic leading-none mb-2">30 DAY <span class="text-rose-600">SHRED</span></h1>
    </header>

    <div class="grid grid-cols-5 gap-3 mb-12" id="daysGrid">
        <script>
            for(let i=1; i<=30; i++) {
                document.write(`<div onclick="openDay(${i})" class="glass day-card">${i}</div>`);
            }
        </script>
    </div>

    <div id="dayModal" class="modal" onclick="this.style.display='none'">
        <div class="glass p-6 w-full max-w-sm max-h-[85vh] flex flex-col" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-3xl font-black italic uppercase text-rose-500 mb-6 text-center"></h2>
            <div id="modalContent" class="overflow-y-auto pr-2 space-y-4"></div>
            <button onclick="document.getElementById('dayModal').style.display='none'" class="mt-6 w-full py-4 bg-white/5 border border-white/10 rounded-xl font-black uppercase text-[10px]">Close Workout</button>
        </div>
    </div>

    <script>
        // stable icon library
        const exerciseLibrary = {
            "Jumping Jacks": { icon: "fa-person-walking-arrow-loop-left", color: "text-blue-400" },
            "High Knees": { icon: "fa-person-running", color: "text-orange-400" },
            "Spot Jog": { icon: "fa-stopwatch-20", color: "text-yellow-400" },
            "Inchworm": { icon: "fa-bug", color: "text-green-400" },
            "Squats": { icon: "fa-arrows-up-down", color: "text-purple-400" },
            "Push Ups": { icon: "fa-mound", color: "text-rose-400" },
            "Tricep Dips": { icon: "fa-chair", color: "text-neutral-400" },
            "Sumo Squats": { icon: "fa-child-reaching", color: "text-red-400" },
            "Lunges": { icon: "fa-shoe-prints", color: "text-emerald-400" },
            "Burpees": { icon: "fa-bolt", color: "text-amber-400" },
            "Mountain Climbers": { icon: "fa-mountain", color: "text-sky-400" },
            "Crunches": { icon: "fa-user-ninja", color: "text-indigo-400" },
            "Leg Raises": { icon: "fa-up-long", color: "text-cyan-400" },
            "Plank Jacks": { icon: "fa-grip-lines", color: "text-slate-400" }
        };

        const names = Object.keys(exerciseLibrary);

        function openDay(day) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = "DAY " + day;

            if (day % 4 === 0) {
                modalContent.innerHTML = `<div class="text-center py-10"><i class="fas fa-couch text-rose-600 text-5xl mb-4"></i><p class="text-lg italic font-black text-rose-500 uppercase">Recovery Day</p><p class="text-xs text-neutral-500 mt-2 italic">Muscle is built during rest. Focus on hydration and mobility.</p></div>`;
            } else {
                const reps = 12 + (Math.floor(day/4) * 2);
                let html = "";
                
                for(let i=0; i<3; i++) {
                    const exName = names[(day + i) % names.length];
                    const exData = exerciseLibrary[exName];
                    html += `
                    <div class="exercise-card flex items-center gap-4">
                        <div class="w-12 h-12 flex items-center justify-center bg-white/5 rounded-lg border border-white/10">
                            <i class="fas ${exData.icon} ${exData.color} text-xl"></i>
                        </div>
                        <div class="flex-1">
                            <p class="font-black uppercase italic text-sm tracking-widest text-white">${exName}</p>
                            <p class="text-[10px] uppercase font-bold text-neutral-500">Target: <span class="text-rose-500 font-black">3 x ${reps}</span></p>
                        </div>
                    </div>`;
                }
                modalContent.innerHTML = html;
            }
            document.getElementById('dayModal').style.display = 'flex';
        }
    </script>
</body>
</html>
