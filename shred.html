<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FMS | 30 Day Shred</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .day-tile { aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; font-style: italic; border-radius: 12px; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .day-tile:active { transform: scale(0.9); }
        .rest-day { opacity: 0.3; background: transparent; }
        .active-day { background: rgba(225, 29, 72, 0.1); border-color: #e11d48; color: #e11d48; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; padding: 20px; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-6 pb-20">
    <header class="mb-10 pt-4">
        <a href="index.html" class="text-rose-500 font-black uppercase text-[10px] tracking-widest mb-4 block">← BACK TO HOME</a>
        <h1 class="text-5xl font-black uppercase italic leading-none tracking-tighter">30 DAY<br><span class="text-rose-600">SHRED</span></h1>
        <p class="text-[10px] font-black uppercase text-neutral-500 mt-4 tracking-[0.3em]">Fat Loss • Conditioning • Physio-Led</p>
    </header>

    <div class="grid grid-cols-5 gap-3 mb-12">
        <script>
            for(let i=1; i<=30; i++) {
                const isRest = (i % 4 == 0);
                document.write(`<div onclick="openDay(${i})" class="glass day-tile ${isRest ? 'rest-day' : 'active-day'}"><span class="text-[8px] uppercase opacity-50 not-italic">Day</span>${i}</div>`);
            }
        </script>
    </div>

    <div class="glass p-8 border-t-4 border-rose-600 text-center">
        <h2 class="text-2xl font-black italic uppercase mb-2">Stuck in a Loop?</h2>
        <p class="text-sm text-neutral-400 mb-6 italic">Generic plans don't know your injuries, metabolism, or lifestyle. Level up to your own custom portal.</p>
        <a href="https://wa.me/919899550279?text=Hi Coach, I want to upgrade to a Personalized Custom Plan" class="inline-block bg-white text-black px-10 py-4 rounded-xl font-black uppercase text-xs tracking-widest">Start Custom Portal</a>
    </div>

    <div id="dayModal" class="modal" onclick="closeDay()">
        <div class="glass p-8 w-full max-w-sm border-t-4 border-rose-600" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-4xl font-black italic uppercase text-white mb-2">Day --</h2>
            <div id="modalContent" class="text-neutral-300 text-sm italic space-y-4 leading-relaxed"></div>
            <button onclick="closeDay()" class="mt-8 w-full py-4 bg-white/5 rounded-xl font-black uppercase text-[10px] tracking-widest border border-white/10">Got it</button>
        </div>
    </div>

    <script>
        const workoutData = {
            1: "<b>Main Workout (3-4 Rounds):</b><br>• Squats x20<br>• Push-ups x15<br>• Lunges x20<br>• Plank 45s<br>• Mt. Climbers x40<br><br><b>Finisher:</b><br>• Burpees x15<br>• Spot Jog 2 mins",
            2: "<b>Circuit Style:</b><br>• Jumping Jacks x50<br>• Push-ups x20<br>• Bodyweight Rows x15<br>• High Knees x40<br><br><b>Intensity:</b> High",
            4: "<b>Rest & Recovery:</b><br>Light walking, stretching, and mobility work for 20-30 mins. Recovery builds warriors.",
            // Modal logic defaults for other days
        };

        function openDay(day) {
            document.getElementById('modalTitle').innerText = "DAY " + day;
            document.getElementById('modalContent').innerHTML = workoutData[day] || workoutData[1];
            document.getElementById('dayModal').style.display = 'flex';
        }
        function closeDay() { document.getElementById('dayModal').style.display = 'none'; }
    </script>
</body>
</html>
